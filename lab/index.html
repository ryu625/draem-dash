<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>dræm. lab — 研究 × 痛みから生まれた日次アプリ実験場</title>
<meta name="description" content="毎日5つ、Reddit/HNの痛みと最新研究から生まれる実験アプリ。無料で試せる、気に入ったら通知登録。">
<style>
:root{--bg:#0D0906;--s1:rgba(255,255,255,.04);--s2:rgba(255,255,255,.08);--gold:#C4A059;--gl:#DFC07A;--t1:#E8DDD0;--t2:#A89585;--t3:#6D5A4A;--grn:#5CB870;--red:#C45B5B}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Hiragino Sans',sans-serif;-webkit-font-smoothing:antialiased;font-size:15px}
body{min-height:100dvh;padding:1.5rem 1rem 4rem;max-width:960px;margin:0 auto;line-height:1.5}
.logo{font-family:Georgia,serif;font-size:2rem;font-weight:700;background:linear-gradient(135deg,#8B6F47,#C4A059,#DFC07A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.2rem}
.logo .sub{font-size:.65rem;color:var(--t3);letter-spacing:.1em;font-family:-apple-system,sans-serif;font-weight:400;text-transform:uppercase;display:block;-webkit-text-fill-color:var(--t3)}
.tag-line{font-size:.85rem;color:var(--t2);margin-bottom:1.5rem;max-width:600px;line-height:1.6}
.tag-line b{color:var(--gl)}
.filters{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.2rem}
.filt{padding:.35rem .7rem;border-radius:20px;background:var(--s1);border:1px solid rgba(255,255,255,.08);font-size:.72rem;color:var(--t2);cursor:pointer;transition:all .15s}
.filt.on{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:700}
.filt:hover:not(.on){border-color:var(--gold);color:var(--t1)}
.stats{display:flex;gap:1rem;margin-bottom:1.2rem;font-size:.75rem;color:var(--t3);flex-wrap:wrap}
.stats b{color:var(--gl);font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.7rem}
.card{background:var(--s1);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:.9rem;transition:all .2s;display:flex;flex-direction:column;min-height:180px}
.card:hover{border-color:rgba(196,160,89,.4);transform:translateY(-1px)}
.card-date{font-size:.55rem;color:var(--t3);letter-spacing:.05em}
.card-title{font-size:.95rem;font-weight:700;color:var(--t1);margin:.3rem 0 .4rem;line-height:1.3}
.card-prob{font-size:.7rem;color:var(--t2);line-height:1.5;flex:1;margin-bottom:.6rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.7rem}
.tag{font-size:.55rem;padding:.12rem .4rem;border-radius:3px;background:var(--s2);color:var(--t3)}
.tag.source{background:rgba(196,160,89,.12);color:var(--gold)}
.tag.research{background:rgba(92,140,196,.15);color:#8eabd0}
.tag.price{background:rgba(92,184,112,.12);color:var(--grn)}
.card a{display:block;text-align:center;background:var(--gold);color:var(--bg);padding:.45rem;border-radius:6px;text-decoration:none;font-weight:700;font-size:.75rem;margin-top:auto}
.card a:hover{background:var(--gl)}
.empty{color:var(--t3);text-align:center;padding:3rem;font-size:.8rem}
footer{margin-top:3rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.06);font-size:.65rem;color:var(--t3);text-align:center;line-height:1.8}
footer a{color:var(--gold);text-decoration:none}
.section-header{font-size:.55rem;color:var(--gold);letter-spacing:.15em;margin:1.5rem 0 .6rem;text-transform:uppercase;font-weight:700}
</style>
</head>
<body>
<div class="logo">dræm. lab<span class="sub">daily research × pain app experiments</span></div>
<div class="tag-line">
  毎日<b>5つ</b>、Reddit・Hacker News の「痛みの投稿」と arXiv・bioRxiv の最新研究から生まれた実験アプリを公開しています。
  無料で即試せて、気に入れば「リリース時に通知」で登録。フィードバックは翌朝のアップデートに反映されます。
</div>

<div class="stats" id="stats"></div>
<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>

<footer>
  <div>made by dræm. — <a href="https://ryu625.github.io/draem-dash/" target="_blank">dashboard</a></div>
  <div style="margin-top:.3rem">各デモは 1-3 時間で作られた実験です。気に入った・気に入らなかったを教えてください。</div>
</footer>

<script>
const DATES = []; // populated via manifest enumeration

async function fetchAllManifests(){
  // Strategy: fetch latest.json first, then walk back using lastDates if published.
  // For simplicity, list known dates array that's maintained by the publisher.
  try {
    const idx = await fetch('dates.json?_=' + Date.now(), {cache:'no-store'});
    if(idx.ok){
      const list = await idx.json();
      const manifests = [];
      for(const date of list){
        try {
          const r = await fetch(`../demos/${date}/manifest.json`, {cache:'no-store'});
          if(r.ok) manifests.push(await r.json());
        } catch(e) { console.warn(date, e); }
      }
      return manifests;
    }
  } catch(e){}
  // fallback: just today via latest
  try {
    const r = await fetch('../demos/latest.json?_=' + Date.now(), {cache:'no-store'});
    if(r.ok) return [await r.json()];
  } catch(e){}
  return [];
}

function flatten(manifests){
  const all = [];
  for(const m of manifests){
    for(const d of (m.demos || [])){
      all.push({...d, date: m.date});
    }
  }
  return all;
}

function uniqueSources(demos){
  const s = new Set();
  for(const d of demos){
    const src = (d.source || '').split('/')[0] || 'unknown';
    s.add(src);
  }
  return Array.from(s);
}

let ALL = [];
let activeFilter = 'all';

function render(){
  const shown = activeFilter === 'all' ? ALL : ALL.filter(d => (d.source||'').startsWith(activeFilter));
  const g = document.getElementById('grid');
  if(shown.length === 0){
    g.innerHTML = '<div class="empty">該当するデモがありません</div>';
    return;
  }
  shown.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  g.innerHTML = shown.map(d => {
    const src = (d.source || '').split('/')[0] || '';
    const isResearch = ['arxiv','biorxiv','medrxiv','hackernews'].includes(src);
    const srcClass = isResearch ? 'research' : 'source';
    const price = d.price_yen ? `¥${d.price_yen.toLocaleString()}` : '';
    const priceTag = price ? `<span class="tag price">${price}</span>` : '';
    return `<div class="card">
      <div class="card-date">${d.date || ''} · ${d.id || ''}</div>
      <div class="card-title">${(d.title||'').replace(/</g,'&lt;')}</div>
      <div class="card-prob">${(d.problem||'').replace(/</g,'&lt;')}</div>
      <div class="card-meta">
        <span class="tag ${srcClass}">${src || '—'}</span>
        ${priceTag}
        ${d.feasibility ? `<span class="tag">fe ${d.feasibility}/10</span>` : ''}
      </div>
      <a href="../${d.demo_path || '#'}?utm_source=lab&utm_campaign=${d.id}&ref=${d.date}" target="_blank">▶ 試す</a>
    </div>`;
  }).join('');
}

function renderFilters(sources){
  const f = document.getElementById('filters');
  const buttons = ['all', ...sources].map(s => {
    const label = s === 'all' ? '全て' : s;
    return `<div class="filt ${s===activeFilter?'on':''}" data-f="${s}">${label}</div>`;
  }).join('');
  f.innerHTML = buttons;
  f.querySelectorAll('.filt').forEach(b => {
    b.addEventListener('click', () => {
      activeFilter = b.dataset.f;
      document.querySelectorAll('.filt').forEach(x => x.classList.toggle('on', x.dataset.f === activeFilter));
      render();
    });
  });
}

function renderStats(){
  const dates = new Set(ALL.map(d => d.date));
  const sources = uniqueSources(ALL);
  document.getElementById('stats').innerHTML = `
    <div>📅 公開日 <b>${dates.size}</b></div>
    <div>🧪 デモ総数 <b>${ALL.length}</b></div>
    <div>📡 ソース <b>${sources.length}</b></div>
  `;
}

(async ()=>{
  const manifests = await fetchAllManifests();
  ALL = flatten(manifests);
  renderStats();
  renderFilters(uniqueSources(ALL));
  render();
})();
</script>
</body>
</html>
