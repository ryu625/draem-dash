<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0906">
<link rel="manifest" href="manifest.json">
<title>dræm.</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0D0906;--s1:rgba(255,255,255,.04);--s2:rgba(255,255,255,.07);--gold:#C4A059;--gl:#DFC07A;--gd:#8B6F47;--gdim:rgba(196,160,89,.15);--t1:#E8DDD0;--t2:#A89585;--t3:#6D5A4A;--grn:#5CB870;--red:#C45B5B}
html{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Hiragino Sans',sans-serif;-webkit-font-smoothing:antialiased;font-size:var(--fs,15px)}
body{min-height:100dvh}
.w{max-width:480px;margin:0 auto;padding:calc(1.5rem + env(safe-area-inset-top)) 1.25rem calc(4rem + env(safe-area-inset-bottom))}
.hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.8rem}
.logo{font-family:Georgia,serif;font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--gd),var(--gold),var(--gl));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:4px;vertical-align:middle;cursor:pointer}
.sync-dot.ok{background:var(--grn)}.sync-dot.ng{background:var(--red)}.sync-dot.wait{background:var(--gold);animation:blink 1s infinite}.sync-dot.off{background:var(--t3);opacity:.4}
.day-b{font-size:.6rem;color:var(--t3);letter-spacing:.06em}
.zoom{display:flex;gap:2px;align-items:center}
.hdr-btn{width:24px;height:24px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:var(--s1);color:var(--t3);font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;font-weight:600;flex-shrink:0}
.hdr-btn:active{background:var(--s2);color:var(--t1)}
.zoom-btn{width:22px;height:22px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:var(--s1);color:var(--t3);font-size:.55rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;font-weight:600}
.zoom-btn:active{background:var(--s2);color:var(--t1)}
.refresh-btn{width:24px;height:24px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:var(--s1);color:var(--t3);font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.refresh-btn:active{background:var(--s2);color:var(--t1)}

/* Dream Countdown */
.dream-bar{text-align:center;margin-bottom:.8rem;padding:.4rem 0}
.dream-pct{font-family:Georgia,serif;font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--gd),var(--gold),var(--gl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.dream-label{font-size:.48rem;color:var(--t3);margin-top:.15rem;letter-spacing:.06em}
.dream-track{height:4px;border-radius:2px;background:rgba(255,255,255,.05);margin:.35rem 1.5rem 0;overflow:hidden}
.dream-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gd),var(--gold),var(--gl));transition:width 1s ease}
.dream-row{display:flex;justify-content:center;gap:1rem;margin-top:.4rem;font-size:.45rem;color:var(--t3)}
.dream-row span b{color:var(--gl)}

/* Quote */
.quote{font-size:.6rem;color:var(--t3);font-style:italic;text-align:center;margin-bottom:.8rem;padding:0 .5rem;line-height:1.5;min-height:1.2rem}

/* Reflection */
.reflect-bar{display:flex;gap:.3rem;justify-content:center;margin-bottom:.8rem}
.reflect-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.08);background:var(--s1);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.reflect-btn:active{transform:scale(1.2)}.reflect-btn.sel{border-color:var(--gold);background:var(--gdim);box-shadow:0 0 8px rgba(196,160,89,.2)}
.reflect-note{font-size:.48rem;color:var(--t3);text-align:center;margin-top:.2rem}

/* Celebration */
.celeb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;text-align:center;pointer-events:none;animation:celebIn .5s ease}
.celeb-emoji{font-size:3rem;animation:celebBounce .8s ease}
.celeb-text{font-size:.8rem;color:var(--gold);font-weight:600;margin-top:.3rem;font-family:Georgia,serif}
@keyframes celebIn{from{opacity:0;transform:translate(-50%,-50%) scale(.3)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes celebBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}

/* Insight Badge */
.insight{font-size:.5rem;color:var(--t2);background:rgba(196,160,89,.08);border:1px solid rgba(196,160,89,.12);border-radius:6px;padding:.3rem .5rem;margin-bottom:.6rem;line-height:1.5;text-align:center}
.insight b{color:var(--gold)}

/* Focus */
.focus{padding:.8rem;background:linear-gradient(135deg,rgba(196,160,89,.1),rgba(196,160,89,.03));border:1px solid rgba(196,160,89,.18);border-radius:12px;margin-bottom:1rem}
.focus-label{font-size:.5rem;color:var(--gold);text-transform:uppercase;letter-spacing:.15em;font-weight:600;margin-bottom:.3rem}
.focus-text{font-size:.95rem;font-weight:600;line-height:1.4}
.focus-sub{font-size:.6rem;color:var(--t2);margin-top:.25rem}

/* Timer */
.timer-box{background:var(--s1);border:1px solid rgba(255,255,255,.06);border-radius:10px;margin-bottom:.8rem;padding:.6rem .8rem}
.timer-row{display:flex;align-items:center;gap:.6rem}
.timer-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--gold);background:transparent;color:var(--gold);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.timer-btn.running{border-color:var(--red);color:var(--red);animation:pulse 2s infinite}
.timer-btn:active{opacity:.7}
.timer-time{font-family:Georgia,serif;font-size:1.3rem;font-weight:700;color:var(--gl);min-width:65px}
.timer-info{flex:1;text-align:right}
.timer-week{font-size:.6rem;color:var(--t2)}.timer-week b{color:var(--gl)}
.timer-cats{display:flex;gap:3px;margin-top:.45rem;flex-wrap:wrap}
.tc{padding:.2rem .4rem;font-size:.48rem;border-radius:4px;background:var(--s2);color:var(--t3);cursor:pointer;border:1px solid transparent;transition:all .15s}
.tc.sel{background:var(--gdim);color:var(--gold);border-color:rgba(196,160,89,.3);font-weight:600}
.tc:active{opacity:.7}
.timer-stats{display:flex;gap:3px;margin-top:.4rem;flex-wrap:wrap}
.ts-item{font-size:.45rem;color:var(--t3);display:flex;align-items:center;gap:2px}
.ts-bar{display:inline-block;height:6px;border-radius:2px;background:var(--gold);min-width:2px}

/* Song Progress */
.song-prog{margin-bottom:1rem}
.song-title{font-size:.85rem;font-weight:600;margin-bottom:.4rem}
.song-title span{color:var(--gold)}
.song-stages{display:flex;gap:2px}
.stage{flex:1;text-align:center;padding:.35rem .15rem;font-size:.5rem;color:var(--t3);background:var(--s1);border-radius:4px;cursor:pointer;transition:all .15s;line-height:1.2}
.stage.done{background:var(--gdim);color:var(--gold)}
.stage.active{background:var(--gold);color:var(--bg);font-weight:700}
.stage:active{opacity:.7}

/* Pace */
.pace{display:flex;gap:.5rem;margin-bottom:1rem}
.pace-card{flex:1;background:var(--s1);border:1px solid rgba(255,255,255,.05);border-radius:9px;padding:.5rem .6rem;text-align:center}
.pace-num{font-family:Georgia,serif;font-size:1.1rem;font-weight:700}
.pace-num.on-track{color:var(--grn)}.pace-num.behind{color:var(--red)}.pace-num.neutral{color:var(--gl)}
.pace-label{font-size:.45rem;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-top:.1rem}

/* Streak */
.streak{display:flex;align-items:center;gap:.6rem;padding:.5rem .8rem;background:var(--s1);border:1px solid rgba(255,255,255,.06);border-radius:10px;margin-bottom:.6rem}
.sk-fire{font-size:1.1rem}.sk-num{font-family:Georgia,serif;font-size:1.2rem;font-weight:700;color:var(--gl)}.sk-label{font-size:.55rem;color:var(--t2)}
.sk-r{margin-left:auto;text-align:right}.sk-stat{font-size:.55rem;color:var(--t3)}.sk-stat b{color:var(--t2)}
.heatmap{display:flex;gap:2px;flex-wrap:wrap;justify-content:flex-end;margin-bottom:.8rem}
.hm{width:10px;height:10px;border-radius:2px;background:var(--s1)}.hm.on{background:rgba(196,160,89,.45)}.hm.today{outline:1.5px solid var(--gl);outline-offset:1px}

.sec{font-size:.55rem;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;font-weight:600;margin:1rem 0 .4rem;display:flex;align-items:center;gap:.4rem}
.sec::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}

/* Tabs */
.tabs{display:flex;gap:.2rem;margin-bottom:.4rem;flex-wrap:wrap}
.tab{padding:.3rem .45rem;font-size:.55rem;font-weight:600;color:var(--t3);background:var(--s1);border:1px solid rgba(255,255,255,.05);border-radius:6px;cursor:pointer;white-space:nowrap}
.tab.active{color:var(--gold);border-color:var(--gold);background:var(--gdim)}

/* Tasks */
.task{display:flex;align-items:center;gap:.4rem;padding:.45rem .6rem;background:var(--s1);border:1px solid rgba(255,255,255,.05);border-radius:8px;margin-bottom:.25rem;cursor:pointer;transition:background .1s}
.task:active{background:var(--s2)}.task.done{opacity:.3}.task.done .tk-text{text-decoration:line-through}
.tk-ck{width:16px;height:16px;border:2px solid var(--t3);border-radius:50%;flex-shrink:0;cursor:pointer;padding:4px;box-sizing:content-box}
.task.done .tk-ck{border-color:var(--grn);background:var(--grn)}
.tk-body{flex:1;min-width:0}.tk-text{font-size:.75rem;font-weight:500;line-height:1.3}
.tk-meta{font-size:.5rem;color:var(--t3);margin-top:.05rem;display:flex;gap:.35rem;flex-wrap:wrap}
.tk-cat{font-weight:600}
.tk-due{font-weight:600;padding:.05rem .2rem;border-radius:3px}
.tk-due.safe{color:var(--grn)}.tk-due.warn{color:#D4A83A;background:rgba(212,168,58,.1)}
.tk-due.urgent{color:var(--red);background:rgba(196,91,91,.12)}.tk-due.overdue{color:#fff;background:var(--red)}
.tk-edit{color:var(--t3);font-size:.5rem;padding:.1rem .2rem;opacity:.5;flex-shrink:0}.tk-rec{color:var(--gold);font-size:.45rem}
.cf-step{display:flex;align-items:center;gap:.5rem;padding:.3rem 0;border-bottom:1px solid rgba(255,255,255,.05)}
.cf-step.done-step .cf-text{text-decoration:line-through;opacity:.4}
.cf-ck{width:14px;height:14px;border:1.5px solid var(--t3);border-radius:3px;flex-shrink:0;cursor:pointer;transition:background .1s}
.cf-step.done-step .cf-ck{background:var(--grn);border-color:var(--grn)}
.cf-text{font-size:.65rem;flex:1;line-height:1.3}.cf-num{font-size:.45rem;color:var(--t3);width:1.2rem;flex-shrink:0}
.cf-prog{height:4px;background:var(--s2);border-radius:2px;margin:.3rem 0}.cf-prog-fill{height:100%;background:var(--gl);border-radius:2px;transition:width .3s}
.cf-date{font-size:.45rem;color:var(--t3);margin-left:auto;padding:.05rem .25rem;border-radius:3px;border:1px solid rgba(255,255,255,.1);cursor:pointer;white-space:nowrap;flex-shrink:0}
.cf-date:hover{border-color:var(--gold);color:var(--gold)}
.cf-del{font-size:.45rem;color:var(--t3);padding:.1rem .2rem;cursor:pointer;opacity:.4;flex-shrink:0}.cf-del:hover{opacity:1;color:var(--red)}
.cf-drag{font-size:.6rem;color:var(--t3);padding:0 .3rem;cursor:grab;opacity:.4;flex-shrink:0;touch-action:none}.cf-drag:hover{opacity:1}
.cf-dragging{opacity:.4;background:var(--s2)!important}
.cf-drop-here{border-top:2px solid var(--gold)!important}
.tk-del{color:var(--t3);font-size:.55rem;padding:.1rem .25rem}
@media(hover:none){.tk-del{opacity:.5}}
.task-empty{text-align:center;padding:.8rem;color:var(--t3);font-size:.7rem;background:var(--s1);border-radius:8px;border:1px dashed rgba(255,255,255,.08)}
.task-add{display:flex;gap:.3rem;margin-top:.3rem}
.tk-inp{flex:1;background:var(--s1);border:1px solid rgba(255,255,255,.08);border-radius:7px;padding:.4rem .55rem;color:var(--t1);font-size:.75rem;font-family:inherit;outline:none}
.tk-inp:focus{border-color:var(--gold)}.tk-inp::placeholder{color:var(--t3)}
.tk-btn{background:var(--gold);color:var(--bg);border:none;border-radius:7px;padding:0 .6rem;font-size:.6rem;font-weight:600;cursor:pointer;font-family:inherit}
.tk-btn:active{opacity:.8}
.sel{background:var(--s1);border:1px solid rgba(255,255,255,.08);border-radius:7px;padding:.4rem .15rem;color:var(--t2);font-size:.55rem;font-family:inherit;outline:none;-webkit-appearance:none}

/* Phase */
.phase-ring{display:flex;justify-content:center;gap:.35rem;margin:.5rem 0}
.ph{text-align:center}.ph-c{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:1.1rem;font-weight:700;border:2px solid var(--t3);color:var(--t3)}
.ph-c.released{border-color:var(--gold);color:var(--gold);background:var(--gdim)}
.ph-c.in_progress{border-color:var(--gl);color:var(--gl);box-shadow:0 0 12px rgba(196,160,89,.3);animation:pulse 2.5s ease-in-out infinite}
.ph-c.planned{opacity:.3}
.ph-t{font-size:.5rem;color:var(--t2);margin-top:.15rem}
.ph-conn{width:12px;height:2px;background:var(--t3);opacity:.3;align-self:center;margin-top:-.6rem}
.ph-conn.done{background:var(--gold);opacity:.6}

/* KPI */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin:.4rem 0}
.kpi{background:var(--s1);border:1px solid rgba(255,255,255,.05);border-radius:8px;padding:.45rem .55rem;cursor:pointer}
.kpi:active{background:var(--s2)}
.kpi-l{font-size:.45rem;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;font-weight:500}
.kpi-v{font-family:Georgia,serif;font-size:1.2rem;font-weight:600;color:var(--t1);margin:.05rem 0}
.kpi-t{font-size:.45rem;color:var(--t3)}
.kpi-bar{height:3px;border-radius:2px;background:rgba(255,255,255,.06);margin-top:.25rem;overflow:hidden}
.kpi-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gd),var(--gold));transition:width .6s ease}

/* Asset */
.asset-total{background:var(--s1);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:.55rem .7rem;margin:.3rem 0;display:grid;grid-template-columns:1fr 1fr;gap:.3rem}
.asset-tot-item .asset-l{font-size:.45rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.asset-tot-item .asset-v{font-family:Georgia,serif;font-size:1.1rem;font-weight:700;color:var(--t1);margin:.05rem 0}
.asset-gain-line{font-size:.6rem;font-weight:700}.asset-gain-line.plus{color:#6abf8a}.asset-gain-line.minus{color:var(--red)}
.asset-sec-lbl{font-size:.48rem;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin:.5rem 0 .2rem;padding-bottom:.2rem;border-bottom:1px solid rgba(255,255,255,.05)}
.asset-fund{display:grid;grid-template-columns:1fr auto auto;gap:.3rem;align-items:center;padding:.35rem .5rem;background:var(--s1);border:1px solid rgba(255,255,255,.04);border-radius:7px;margin-bottom:.2rem}
.asset-fn{font-size:.58rem;font-weight:500;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asset-fc{font-size:.48rem;color:var(--t3);margin-top:.05rem}
.asset-fv{font-size:.6rem;font-weight:600;color:var(--t1);text-align:right}
.asset-fg{font-size:.52rem;font-weight:600;text-align:right;min-width:3.2rem}.asset-fg.plus{color:#6abf8a}.asset-fg.minus{color:var(--red)}
.asset-import-btn{font-size:.48rem;padding:.18rem .45rem;border-radius:5px;border:1px solid rgba(196,160,89,.3);background:transparent;color:var(--gold);cursor:pointer;font-family:inherit;white-space:nowrap}
.asset-proj{background:var(--s1);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:.5rem .7rem;margin:.4rem 0}
.asset-proj-row{display:flex;justify-content:space-between;align-items:center;font-size:.55rem;color:var(--t2);margin-bottom:.15rem}
.asset-proj-row b{color:var(--t1)}
.proj-bar-wrap{background:rgba(255,255,255,.06);border-radius:4px;height:5px;margin:.2rem 0;overflow:hidden}
.proj-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gd),var(--gold));transition:width .8s ease}
.asset-monthly{background:var(--gdim);border:1px solid rgba(196,160,89,.2);border-radius:8px;padding:.4rem .6rem;margin:.35rem 0;display:flex;align-items:center;justify-content:space-between}
.asset-monthly-l{font-size:.48rem;color:var(--t3)}
.asset-monthly-v{font-family:Georgia,serif;font-size:1rem;font-weight:700;color:var(--gold)}
.asset-salary-row{display:flex;align-items:center;gap:.4rem;margin:.3rem 0}
.asset-salary-inp{flex:1;background:var(--s1);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:.3rem .45rem;color:var(--t1);font-size:.65rem;font-family:inherit;outline:none}
.asset-salary-inp:focus{border-color:var(--gold)}
.asset-empty{text-align:center;padding:1rem;color:var(--t3);font-size:.65rem;background:var(--s1);border-radius:8px;border:1px dashed rgba(255,255,255,.08);line-height:1.8}
/* Mission */
.mission{text-align:center;margin:1.2rem 0 .5rem;padding:.8rem .5rem;border-top:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.04)}
.mission-text{font-family:Georgia,serif;font-size:.95rem;font-weight:600;color:var(--t1);line-height:1.7}
.mission-sub{font-size:.6rem;color:var(--t3);margin-top:.3rem;font-style:italic}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-bg.show{display:flex}.modal{background:#1a1410;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:1rem;width:92%;max-width:300px}
.modal h3{font-size:.8rem;color:var(--t1);margin-bottom:.6rem}
.mf{margin-bottom:.4rem}.mf label{display:block;font-size:.5rem;color:var(--t3);margin-bottom:.1rem;text-transform:uppercase;letter-spacing:.08em}
.mf input,.mf textarea{width:100%;background:var(--s1);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:.35rem;color:var(--t1);font-size:.75rem;font-family:inherit;outline:none}
.mf input:focus,.mf textarea:focus{border-color:var(--gold)}
.mf textarea{resize:vertical;min-height:50px}
.m-acts{display:flex;gap:.35rem;margin-top:.6rem}
.m-acts button{flex:1;padding:.35rem;border:none;border-radius:6px;font-size:.65rem;font-weight:600;cursor:pointer;font-family:inherit}
.m-save{background:var(--gold);color:var(--bg)}.m-cancel{background:var(--s2);color:var(--t2)}

.ftr{text-align:center;margin-top:.8rem;font-size:.45rem;color:rgba(255,255,255,.12)}
.gear{cursor:pointer;font-size:.6rem;color:var(--t3);padding:.15rem}

/* Activity Log */
.al-week{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.35rem}
.al-label{font-size:.55rem;color:var(--t2);font-weight:600}
.al-cmp{font-size:.45rem;padding:.1rem .3rem;border-radius:3px}
.al-cmp.up{color:var(--grn);background:rgba(92,184,112,.1)}
.al-cmp.down{color:var(--red);background:rgba(196,91,91,.1)}
.al-cmp.flat{color:var(--t3);background:var(--s1)}
.al-bars{display:flex;flex-direction:column;gap:3px;margin-bottom:.5rem}
.al-row{display:flex;align-items:center;gap:.35rem}
.al-cat{font-size:.45rem;color:var(--t2);width:50px;text-align:right;flex-shrink:0}
.al-fill{height:10px;border-radius:3px;background:linear-gradient(90deg,var(--gd),var(--gold));min-width:0;transition:width .4s}
.al-fill.prev{background:var(--s2);opacity:.6}
.al-dur{font-size:.42rem;color:var(--t3);margin-left:2px}
.al-sessions{margin-top:.3rem}
.al-s{display:flex;align-items:center;gap:.35rem;padding:.25rem 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.5rem}
.al-s-date{color:var(--t3);width:38px;flex-shrink:0}
.al-s-cat{color:var(--gold);font-weight:600;width:42px;flex-shrink:0}
.al-s-time{color:var(--t2)}
.al-s-edit{color:var(--gold);font-size:.55rem;padding:.15rem .25rem;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.al-s-edit:active{opacity:.7}

function calcRealProgress(){
  const G=DB.goals||DEF_GOALS;

  const totalSec=(DB.timerLog||[]).reduce((s,l)=>s+l.sec,0);
  const hoursTarget=500;
  const hoursPct=Math.min(100,(totalSec/3600)/hoursTarget*100);
  const songsPct=Math.min(100,released/G.yearSongs*100);
  const subPct=Math.min(100,sub/G.subTarget*100);
  const playPct=Math.min(100,plays/G.playTarget*100);
  const revPct=Math.min(100,rev/G.revenueTarget*100);
  const realPct=Math.round((songsPct*0.2+subPct*0.2+playPct*0.2+revPct*0.2+hoursPct*0.2)*10)/10;
  return{realPct,songsPct,subPct,playPct,revPct,hoursPct,released,totalSec:Math.floor(totalSec/3600)};
}

// ── Logging Engine ──
function localDateStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getWeekStart(){const d=new Date(today);d.setDate(d.getDate()-dayOfWeek);return localDateStr(d);}

function snapshotIfNeeded(){
  const ws=getWeekStart();
  // KPI snapshot: 今日まだ記録してなければ
  if(!DB.kpiLog.find(e=>e.date===todayStr)){
    DB.kpiLog.push({date:todayStr,subscribers:DB.kpi.subscribers||0,total_plays:DB.kpi.total_plays||0,revenue:DB.kpi.revenue||0,songs:DB.kpi.songs||0});
    // 90日超は削除（容量節約）
    const cutoff=new Date(today);cutoff.setDate(today.getDate()-90);
    const cutStr=cutoff.toISOString().slice(0,10);
    DB.kpiLog=DB.kpiLog.filter(e=>e.date>=cutStr);
  }
  // Weekly snapshot: 今週分まだなければ
  if(!DB.weeklyLog.find(e=>e.weekStart===ws)){
    const wl=weekLogs();
    const byCat={};wl.forEach(l=>{byCat[l.cat]=(byCat[l.cat]||0)+l.sec;});
    DB.weeklyLog.push({weekStart:ws,totalSec:wl.reduce((s,l)=>s+l.sec,0),byCat,kpi:{...DB.kpi}});
    // 52週超は削除
    if(DB.weeklyLog.length>52)DB.weeklyLog=DB.weeklyLog.slice(-52);
  }
}

function logSuggestion(text,type,context){
  // 同じ週に同じ提案が既にあればスキップ
  const ws=getWeekStart();
  if(DB.suggestionLog.find(s=>s.weekStart===ws&&s.type===type))return;
  DB.suggestionLog.push({
    id:Date.now(),date:todayStr,weekStart:ws,text,type,
    context:{kpi:{...DB.kpi},weeklyHours:weekTotal()/3600,...context},
    effective:null,evaluatedDate:null,
  });
  if(DB.suggestionLog.length>200)DB.suggestionLog=DB.suggestionLog.slice(-200);
}

function evaluateSuggestions(){
  const prevWs=new Date(today);prevWs.setDate(today.getDate()-7);
  const prevWsStr=prevWs.toISOString().slice(0,10);
  DB.suggestionLog.filter(s=>s.weekStart===prevWsStr&&s.effective===null).forEach(s=>{
    const prevSnap=DB.weeklyLog.find(w=>w.weekStart===prevWsStr);
    const curSnap=DB.weeklyLog.find(w=>w.weekStart===getWeekStart());
    if(!prevSnap||!curSnap){s.effective=null;return;}
    let effective=false;
    if(s.type==='kpi_sub'){effective=(curSnap.kpi.subscribers||0)>(prevSnap.kpi.subscribers||0);}
    else if(s.type==='kpi_play'){effective=(curSnap.kpi.total_plays||0)>(prevSnap.kpi.total_plays||0);}
    else if(s.type==='work_hours'){effective=curSnap.totalSec>=(s.context?.goalSec||0);}
    else if(s.type==='music_ratio'){
      const mCats=['🎵作曲','🎛️MIX','🎬MV','🎤ボーカル','🚀リリース'];
      const prevM=Object.entries(prevSnap.byCat||{}).filter(([c])=>mCats.some(mc=>c.includes(mc))).reduce((a,[,v])=>a+v,0);
      const curM=Object.entries(curSnap.byCat||{}).filter(([c])=>mCats.some(mc=>c.includes(mc))).reduce((a,[,v])=>a+v,0);
      effective=curM>prevM*1.1;
    }
    else{effective=false;}
    s.effective=effective;
    s.evaluatedDate=todayStr;
  });
}

// ── Prediction Engine ──
function calcPredictions(){
  const G=DB.goals||DEF_GOALS;
  const sub=DB.kpi?.subscribers||0;
  const plays=DB.kpi?.total_plays||0;
  const rev=DB.kpi?.revenue||0;
  const logs=DB.timerLog||[];
  const dn=Math.max(1,dayN);

  // Growth rate per day (from day 1)
  const subRate=sub/dn;
  const playRate=plays/dn;
  const revRate=rev/dn;

  function daysToTarget(current,target,rate){
    if(current>=target)return 0;
    if(rate<=0)return null;
    return Math.ceil((target-current)/rate);
  }
  function fmtDays(d){
    if(d===null)return '—';
    if(d===0)return '達成済';
    if(d<30)return d+'日';
    if(d<365)return Math.round(d/30)+'ヶ月';
    return (d/365).toFixed(1)+'年';
  }

  // Weekly hours avg (last 4 weeks)
  const fw=new Date(today);fw.setDate(fw.getDate()-28);
  const fwStr=fw.toISOString().slice(0,10);
  const recentH=logs.filter(l=>l.date>=fwStr).reduce((s,l)=>s+l.sec,0)/3600;
  const weeklyAvg=recentH/4;

  // Best day of week
  const byday=[0,0,0,0,0,0,0];
  logs.forEach(l=>{const dow=new Date(l.date).getDay();byday[dow]+=l.sec;});
  const bestDow=byday.indexOf(Math.max(...byday));
  const dowNames=['日','月','火','水','木','金','土'];

  // Best hour of day (from ts timestamp)
  const byhour=Array(24).fill(0);
  logs.forEach(l=>{if(l.ts){const h=new Date(l.ts).getHours();byhour[h]+=l.sec;}});
  const bestHour=byhour.indexOf(Math.max(...byhour));
  const bestHourTotal=byhour[bestHour];

  return {
    sub:{days:daysToTarget(sub,G.subTarget,subRate),fmt:fmtDays(daysToTarget(sub,G.subTarget,subRate)),onTrack:subRate>0&&daysToTarget(sub,G.subTarget,subRate)<=dreamDaysLeft},
    plays:{days:daysToTarget(plays,G.playTarget,playRate),fmt:fmtDays(daysToTarget(plays,G.playTarget,playRate)),onTrack:playRate>0&&daysToTarget(plays,G.playTarget,playRate)<=dreamDaysLeft},
    rev:{days:daysToTarget(rev,G.revenueTarget,revRate),fmt:fmtDays(daysToTarget(rev,G.revenueTarget,revRate)),onTrack:revRate>0&&daysToTarget(rev,G.revenueTarget,revRate)<=dreamDaysLeft},
    weeklyAvg,
    bestDow:byday[bestDow]>3600?dowNames[bestDow]:null,
    bestHour:bestHourTotal>3600?bestHour:null,
  };
}

  const yStr=yesterday.toISOString().slice(0,10);

  const todayEntry=(DB.goodmot||[]).find(g=>g.date===todayStr);
  const streak14=(()=>{let s=0;for(let i=0;i<14;i++){const d=new Date(today);d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);if((DB.goodmot||[]).find(g=>g.date===ds))s++;else break;}return s;})();
  let html='';
  if(streak14>=14)html+=`🏅 Good & Mot <b>14日連続</b> — 習慣化完了！<br>`;
  else if(streak14>=7)html+=`✨ Good & Mot <b>${streak14}日連続</b> — あと${14-streak14}日で習慣化！<br>`;

}

// ── Insight Engine ──
function calcInsights(){
  const insights=[];
  const logs=DB.timerLog||[];
  const musicCats=['🎵作曲','🎛️MIX','🎬MV','🎤ボーカル','🚀リリース'];

  // Days since last activity per music category
  musicCats.forEach(cat=>{
    const last=logs.filter(l=>l.cat===cat).sort((a,b)=>b.date.localeCompare(a.date))[0];
    if(last){
      const d=Math.floor((today-new Date(last.date))/864e5);
      if(d>=7)insights.push(`<b>${d}日間</b> ${cat}をしていない`);
    }
  });

  // Streak record
  const sk=streak();
  if(sk>0&&sk>=(DB.bestStreak||0)){
    if(sk>DB.bestStreak){DB.bestStreak=sk;insights.push(`🏆 ストリーク自己ベスト更新！ <b>${sk}日</b>`);}
  }

  // Total hours milestone
  const totalH=Math.floor(logs.reduce((s,l)=>s+l.sec,0)/3600);
  const milestones=[10,25,50,100,200,500];
  const nextM=milestones.find(m=>m>totalH);
  const prevM=milestones.filter(m=>m<=totalH).pop();
  if(prevM&&totalH-prevM<3)insights.push(`🎉 累計 <b>${prevM}時間</b> 突破！`);
  if(nextM)insights.push(`次のマイルストーン: <b>${nextM}h</b> (あと${nextM-totalH}h)`);

  // Work pattern
  const pred=calcPredictions();
  if(pred.bestDow)insights.push(`最も作業多い曜日: <b>${pred.bestDow}曜日</b>`);
  if(pred.bestHour!==null){const h=pred.bestHour;const label=h<12?'午前'+h+'時':h<18?'午後'+(h-12)+'時':'夜'+h+'時';insights.push(`最も生産的な時間帯: <b>${label}台</b>`);}
  // SNS投稿ペース
  const snsLog=DB.snsLog||[];
  const ws=getWeekStart();const thisSns=snsLog.find(s=>s.weekStart===ws);
  if(thisSns&&(thisSns.ig||0)+(thisSns.tt||0)===0)insights.push(`今週のSNS投稿が0件 — 登録者増加に影響する可能性`);
  if(pred.weeklyAvg>0&&pred.weeklyAvg<(DB.goals||DEF_GOALS).weeklyHours*0.7)insights.push(`直近4週の週平均: <b>${pred.weeklyAvg.toFixed(1)}h</b> — 目標の${Math.round(pred.weeklyAvg/(DB.goals||DEF_GOALS).weeklyHours*100)}%`);

  return insights;
}

// ── Recurring Task Engine ──
function processRecurring(){
  const rc=DB.recurring||[];
  let created=false;
  const todayDow=today.getDay();
  rc.forEach(r=>{
    if(!r.text||!r.interval)return;
    // 開始日・終了日チェック
    if(r.startDate&&todayStr<r.startDate)return;
    if(r.endDate&&todayStr>r.endDate)return;
    // 曜日指定がある場合は今日が対象外ならスキップ
    if(r.days&&r.days.length>0&&!r.days.includes(todayDow))return;
    const last=r.lastCreated||'';
    const shouldCreate=(r.interval==='daily'&&last<todayStr)||(r.interval==='weekly'&&(!last||Math.floor((today-new Date(last))/864e5)>=7));
    if(shouldCreate){
      const existing=DB.tasks.find(t=>t.text===r.text&&!t.done&&t.created===todayStr);
      if(!existing){
        const due=r.interval==='weekly'?new Date(today.getTime()+7*864e5).toISOString().slice(0,10):todayStr;
        DB.tasks.push({id:Date.now()+Math.random(),text:r.text,cat:r.cat||'',due:due,done:false,created:todayStr,doneDate:'',recurring:true});
        r.lastCreated=todayStr;
        created=true;
      }
    }
  });
  if(created)save();
}

// ── Recurring task dedup (same text + same created date → keep only one) ──
(()=>{
  const seen=new Set();
  const before=DB.tasks.length;
  DB.tasks=DB.tasks.filter(t=>{
    if(!t.recurring)return true;
    const key=t.text+'|'+t.created;
    if(seen.has(key))return false;
    seen.add(key);return true;
  });
  if(DB.tasks.length<before)save();
})();

function setCookie(k,v,days){document.cookie=`${k}=${encodeURIComponent(v)};max-age=${days*86400};path=/;SameSite=Strict`;}
function getCookie(k){const m=document.cookie.match(new RegExp('(?:^|;\\s*)'+k+'=([^;]*)'));return m?decodeURIComponent(m[1]):null;}
function gc(){
  let v=localStorage.getItem(GK);

  try{return JSON.parse(v)||{}}catch{return{}}

function dbHash(){return JSON.stringify(DB).length+'_'+(DB.ver||0)+'_'+(DB.updated||'');}

function mergeDB(remote){
  const local=DB;
  if(!remote||typeof remote!=='object')return false;
  let changed=false;

  // Merge tasks: combine by id, prefer newer doneDate, keep additions from both sides
  const localMap=new Map((local.tasks||[]).map(t=>[t.id,t]));
  const remoteMap=new Map((remote.tasks||[]).map(t=>[t.id,t]));
  const allIds=new Set([...localMap.keys(),...remoteMap.keys()]);
  const merged=[];
  allIds.forEach(id=>{
    const l=localMap.get(id),r=remoteMap.get(id);
    if(l&&r){merged.push(l.done&&!r.done?l:!l.done&&r.done?r:(l.id>=r.id?l:r));}
    else{merged.push(l||r);}
  });
  // Dedup recurring tasks by text+created (keep first occurrence)
  const rcSeen=new Set();
  const deduped=merged.filter(t=>{if(!t.recurring)return true;const k=t.text+'|'+t.created;if(rcSeen.has(k))return false;rcSeen.add(k);return true;});
  if(JSON.stringify(deduped)!==JSON.stringify(local.tasks)){local.tasks=deduped;changed=true;}

  // Merge timer logs: union by timestamp
  const localTs=new Set((local.timerLog||[]).map(l=>l.ts));
  (remote.timerLog||[]).forEach(l=>{if(!localTs.has(l.ts)){(local.timerLog=local.timerLog||[]).push(l);changed=true;}});

  // Merge days: union
  const daySet=new Set([...(local.days||[]),...(remote.days||[])]);
  if(daySet.size!==(local.days||[]).length){local.days=[...daySet].sort();changed=true;}

  // KPI: take higher values (more recent data)
  ['subscribers','total_plays','songs','revenue'].forEach(k=>{
    if((remote.kpi?.[k]||0)>(local.kpi?.[k]||0)){local.kpi[k]=remote.kpi[k];changed=true;}
  });

  // Song stage, mission, songs, goals, recurring: take from whichever is newer
  if((remote.updated||'')>(local.updated||'')){
    if(remote.songStage!==undefined&&remote.songStage!==local.songStage){local.songStage=remote.songStage;changed=true;}
    if(remote.songStages&&JSON.stringify(remote.songStages)!==JSON.stringify(local.songStages)){local.songStages={...local.songStages,...remote.songStages};changed=true;}
    if(remote.mission&&remote.mission!==local.mission){local.mission=remote.mission;changed=true;}
    if(remote.timerCat&&remote.timerCat!==local.timerCat){local.timerCat=remote.timerCat;changed=true;}
    if(remote.songs&&JSON.stringify(remote.songs)!==JSON.stringify(local.songs)){local.songs=remote.songs;changed=true;}
    if(remote.goals&&JSON.stringify(remote.goals)!==JSON.stringify(local.goals)){local.goals=remote.goals;changed=true;}
    if(remote.recurring&&JSON.stringify(remote.recurring)!==JSON.stringify(local.recurring)){const localRcMap=new Map((local.recurring||[]).map(r=>[r.text,r]));local.recurring=remote.recurring.map(rr=>{const lr=localRcMap.get(rr.text);return lr?{...rr,lastCreated:rr.lastCreated>lr.lastCreated?rr.lastCreated:lr.lastCreated}:rr;});changed=true;}
    if(remote.bestStreak>(local.bestStreak||0)){local.bestStreak=remote.bestStreak;changed=true;}
    if(remote.apiSettings&&JSON.stringify(remote.apiSettings)!==JSON.stringify(local.apiSettings)){local.apiSettings=remote.apiSettings;changed=true;}
  }
  // Merge reflections by date
  const localRefDates=new Set((local.reflections||[]).map(r=>r.date));
  (remote.reflections||[]).forEach(r=>{if(!localRefDates.has(r.date)){(local.reflections=local.reflections||[]).push(r);changed=true;}});

  // Merge swimLog: union by date, prefer local
  if(remote.swimLog&&Array.isArray(remote.swimLog)){
    if(!local.swimLog)local.swimLog=[];
    const localSwimDates=new Set(local.swimLog.map(s=>s.date));
    remote.swimLog.forEach(s=>{if(!localSwimDates.has(s.date)){local.swimLog.push(s);changed=true;}});
  }

  // Merge goodmot: union by date, prefer local if same date
  if(remote.goodmot&&Array.isArray(remote.goodmot)){
    if(!local.goodmot)local.goodmot=[];
    const localGMDates=new Set(local.goodmot.map(g=>g.date));
    remote.goodmot.forEach(g=>{if(!localGMDates.has(g.date)){local.goodmot.push(g);changed=true;}});
  }

  // Merge compFlow: per song, keep whichever has more done steps
  if(remote.compFlow&&typeof remote.compFlow==='object'){
    if(!local.compFlow)local.compFlow={};
    Object.keys(remote.compFlow).forEach(key=>{
      const lc=local.compFlow[key],rc=remote.compFlow[key];
      if(!lc){local.compFlow[key]=rc;changed=true;}
      else if((rc?.done?.length||0)>(lc?.done?.length||0)){local.compFlow[key]=rc;changed=true;}
    });
  }

  return changed;
}

function restoreApiFromDB(){
  const a=DB.apiSettings;if(!a)return;
  if(a.gist?.id&&!gc().id){localStorage.setItem(GK,JSON.stringify(a.gist));setCookie(GK,JSON.stringify(a.gist),365);}
  if(a.yt?.apiKey&&!ytConf().apiKey)localStorage.setItem(YT_KEY,JSON.stringify(a.yt));
  if(a.nn?.userId&&!nnConf().userId)localStorage.setItem(NN_KEY,JSON.stringify(a.nn));
}
restoreApiFromDB();

async function syncPull(){
  const c=gc();if(!c.id||!c.token)return;
  if(syncBusy)return;syncBusy=true;
  ss('wait');
  try{
    const r=await fetch('https://api.github.com/gists/'+c.id,{headers:{'Authorization':'token '+c.token,'If-None-Match':''}});
    if(r.status===304){ss('ok');syncBusy=false;return;}
    if(!r.ok)throw 0;
    const g=await r.json();
    const rm=JSON.parse(g.files['draem.json'].content);
    const changed=mergeDB(rm);
    // リモートにapiSettingsがあればlocalStorageに復元
    if(rm.apiSettings)restoreApiFromDB();
    if(changed){
      DB.ver=Math.max(DB.ver||0,rm.ver||0)+1;
      DB.updated=new Date().toISOString();
      localStorage.setItem(DB_KEY,JSON.stringify(DB));
      lastSyncHash=dbHash();
      render();
      await syncPush(true);
    }else{
      lastSyncHash=dbHash();
    }
    ss('ok');
  }catch{ss('ng');}
  syncBusy=false;
}

let st=null;
async function syncPush(immediate){
  const c=gc();if(!c.id||!c.token)return;
  if(!immediate){clearTimeout(st);st=setTimeout(()=>syncPush(true),1200);return;}
  ss('wait');
  try{
    const backupKey=`draem_backup_${todayStr}.json`;
    await fetch('https://api.github.com/gists/'+c.id,{method:'PATCH',headers:{'Authorization':'token '+c.token,'Content-Type':'application/json'},body:JSON.stringify({files:{'draem.json':{content:JSON.stringify(DB)},[backupKey]:{content:JSON.stringify(DB)}}})});
    lastSyncHash=dbHash();
    ss('ok');
  }catch{ss('ng');}
}

// ── YouTube Auto KPI ──
const YT_KEY='draem_yt';
function ytConf(){try{return JSON.parse(localStorage.getItem(YT_KEY))||{}}catch{return{}}}
function parseDuration(iso){const m=/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/.exec(iso||'');if(!m)return 0;return(+(m[1]||0))*3600+(+(m[2]||0))*60+(+(m[3]||0));}
async function fetchYT(){
  const c=ytConf();
  if(!c.apiKey||!c.channelId)return;
  try{
    // チャンネル統計
    const r=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${c.channelId}&key=${c.apiKey}`);
    if(!r.ok)return;
    const d=await r.json();
    const s=d.items?.[0]?.statistics;
    if(!s)return;
    const prev={...DB.kpi};
    DB.kpi.subscribers=+(s.subscriberCount||0);
    DB.kpi.songs=+(s.videoCount||0);

    // 全動画取得 → Shorts(≤60s) / メイン(>60s) に分類
    try{
      const vr=await fetch(`https://www.googleapis.com/youtube/v3/search?part=id&channelId=${c.channelId}&type=video&order=date&maxResults=50&key=${c.apiKey}`);
      if(vr.ok){
        const vd=await vr.json();
        const ids=(vd.items||[]).map(v=>v.id?.videoId).filter(Boolean);
        if(ids.length>0){
          const dr=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails,statistics&id=${ids.join(',')}&key=${c.apiKey}`);
          if(dr.ok){
            const dd=await dr.json();
            let shortViews=0,mainViews=0;
            (dd.items||[]).forEach(v=>{
              const secs=parseDuration(v.contentDetails?.duration);
              const views=+(v.statistics?.viewCount||0);
              if(secs<=60)shortViews+=views;else mainViews+=views;
            });
            DB.kpi.short_plays=shortViews;
            DB.kpi.main_plays=mainViews;
            DB.kpi.total_plays=shortViews+mainViews;
          }
        }
        // 28日以内の投稿数
        const since=new Date(today);since.setDate(since.getDate()-28);
        const recentVr=await fetch(`https://www.googleapis.com/youtube/v3/search?part=id&channelId=${c.channelId}&type=video&order=date&publishedAfter=${since.toISOString()}&maxResults=50&key=${c.apiKey}`);
        if(recentVr.ok){
          const recentVd=await recentVr.json();
          DB.kpi.ytUploads28d=(recentVd.items||[]).length;
          if(!DB.ytUploadLog)DB.ytUploadLog=[];
          const ex=DB.ytUploadLog.find(e=>e.date===todayStr);
          if(!ex)DB.ytUploadLog.push({date:todayStr,count28d:DB.kpi.ytUploads28d});
          else ex.count28d=DB.kpi.ytUploads28d;
          const cut=new Date(today);cut.setDate(today.getDate()-90);
          DB.ytUploadLog=DB.ytUploadLog.filter(e=>e.date>=localDateStr(cut));
        }
      }
    }catch{}

    if(prev.subscribers!==DB.kpi.subscribers||prev.total_plays!==DB.kpi.total_plays||prev.songs!==DB.kpi.songs){
      save();render();
    }
  }catch{}
}

// ── Timer with Category Logging ──
const TCATS=[...Object.values(CATS),'その他'];
if(!DB.timerCat)DB.timerCat=TCATS[0];
if(!DB.timerLog)DB.timerLog=[];

function timerRunning(){return DB.timerStart!=null}
function timerElapsed(){return timerRunning()?Math.floor((Date.now()-DB.timerStart)/1000):0}
function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor(s%3600/60);return h>0?`${h}h${String(m).padStart(2,'0')}m`:`${m}m`}

function weekLogs(){
  const d=new Date(today);d.setDate(d.getDate()-d.getDay());
  const ws=localDateStr(d);
  return (DB.timerLog||[]).filter(l=>l.date>=ws);
}
function weekTotal(){
  return weekLogs().reduce((s,l)=>s+l.sec,0)+timerElapsed();
}
function musicWeekSec(){
  const logs=weekLogs().filter(l=>MUSIC_CATS.some(mc=>l.cat&&l.cat.includes(mc)));
  const sec=logs.reduce((s,l)=>s+l.sec,0);
  const runningMusic=timerRunning()&&MUSIC_CATS.some(mc=>DB.timerCat&&DB.timerCat.includes(mc));
  return sec+(runningMusic?timerElapsed():0);
}
function weekByCat(){
  const m={};
  weekLogs().forEach(l=>{m[l.cat]=(m[l.cat]||0)+l.sec;});
  if(timerRunning())m[DB.timerCat]=(m[DB.timerCat]||0)+timerElapsed();
  return m;
}

function toggleTimer(){
  if(timerRunning()){
    const elapsed=timerElapsed();
    if(elapsed>=10){
      // 停止時の実際の日付を使う（日付またぎ対策）
      const stopDate=new Date().toISOString().slice(0,10);
      DB.timerLog.push({date:stopDate,cat:DB.timerCat,sec:elapsed,ts:DB.timerStart});
    }
    DB.timerStart=null;
  }else{
    DB.timerStart=Date.now();
    recordDay();
  }
  save();renderTimer();
}

function setTimerCat(cat){
  if(timerRunning()){
    const elapsed=timerElapsed();
    if(elapsed>=10){
      DB.timerLog.push({date:todayStr,cat:DB.timerCat,sec:elapsed,ts:DB.timerStart});
    }
    DB.timerStart=Date.now();
  }
  DB.timerCat=cat;
  save();renderTimer();
}

function renderTimer(){
  const running=timerRunning();
  const el=timerElapsed(),wt=weekTotal(),mw=musicWeekSec();
  const goalH=(DB.goals||DEF_GOALS).weeklyHours;const pct=Math.min(100,mw/3600/goalH*100);
  const sessionTime=running?el:0;
  const bc=weekByCat();
  const maxSec=Math.max(1,...Object.values(bc));

  let catBtns=TCATS.map(c=>`<div class="tc ${DB.timerCat===c?'sel':''}" data-tc="${c}">${c}</div>`).join('');

  let stats='';
  const entries=Object.entries(bc).sort((a,b)=>b[1]-a[1]);
  if(entries.length){
    stats=entries.map(([c,s])=>{
      const w=Math.max(4,Math.round(s/maxSec*40));
      return `<div class="ts-item"><span class="ts-bar" style="width:${w}px"></span>${c} ${fmtTime(s)}</div>`;
    }).join('');
  }

  $('#timerBox').innerHTML=`<div class="timer-row"><button class="timer-btn ${running?'running':''}" id="timerToggle">${running?'⏸':'▶'}</button><div class="timer-time">${fmtTime(sessionTime)}</div><div class="timer-info"><div class="timer-week">${running?'<b>'+DB.timerCat+'</b> 計測中':'音楽 <b>'+fmtTime(mw)+'</b> / '+goalH+'h'}</div><div style="height:3px;border-radius:2px;background:var(--s1);margin-top:3px;overflow:hidden"><div style="height:100%;width:${pct}%;border-radius:2px;background:linear-gradient(90deg,var(--gd),var(--gold))"></div></div></div><div class="al-add-btn" id="timerManual" style="flex-shrink:0">✏️</div></div><div class="timer-cats">${catBtns}</div>${stats?'<div class="timer-stats">'+stats+'</div>':''}`;

  $('#timerToggle').addEventListener('click',toggleTimer);
  $('#timerManual').addEventListener('click',()=>openModal('log'));
  $('#timerBox').querySelectorAll('.tc').forEach(el=>el.addEventListener('click',()=>setTimerCat(el.dataset.tc)));
}

function addTask(text,cat,due){if(!text.trim())return;DB.tasks.push({id:Date.now(),text:text.trim(),cat:cat||'',due:due||'',done:false,created:todayStr,doneDate:''});recordDay();save();render();}
// ── Undo ──
let _undoFn=null,_undoTimer=null;
function pushUndo(msg,fn){
  _undoFn=fn;clearTimeout(_undoTimer);
  const t=$('#undoToast');const m=$('#undoMsg');
  if(!t)return;
  m.textContent=msg;t.style.display='flex';
  _undoTimer=setTimeout(()=>{_undoFn=null;t.style.display='none';},4000);
}
function toggle(id){
  const t=DB.tasks.find(x=>x.id===id);
  if(t){
    const wasDone=t.done,wasDate=t.doneDate;
    t.done=!t.done;t.doneDate=t.done?todayStr:'';
    if(t.done){
      const doneCount=DB.tasks.filter(x=>x.done&&x.doneDate===todayStr).length;
      if(doneCount===1)celebrate('✓','最初のタスク完了！');
      else if(doneCount===5)celebrate('🔥','5タスク達成！');
      else if(doneCount===10)celebrate('⚡','10タスク！止まらない');
      const sk=streak();
      if(sk>0&&sk===(DB.bestStreak||0)+1)celebrate('🏆',`ストリーク自己ベスト ${sk}日！`);
    }
    pushUndo(t.done?'完了にしました':'未完了に戻しました',()=>{t.done=wasDone;t.doneDate=wasDate;recordDay();save();render();});
  }
  recordDay();save();render();
}
function del(id){
  const idx=DB.tasks.findIndex(x=>x.id===id);
  if(idx<0)return;
  const removed=DB.tasks.splice(idx,1)[0];
  pushUndo('タスクを削除しました',()=>{DB.tasks.splice(idx,0,removed);save();render();});
  save();render();
}
function dueBadge(due){if(!due)return'';const d=Math.ceil((new Date(due)-today)/864e5);if(d<0)return`<span class="tk-due overdue">${-d}日超過</span>`;if(d===0)return`<span class="tk-due urgent">今日</span>`;if(d<=3)return`<span class="tk-due urgent">あと${d}日</span>`;if(d<=7)return`<span class="tk-due warn">あと${d}日</span>`;return`<span class="tk-due safe">〆${due.slice(5)}</span>`;}
function filtered(){const wk=new Date(today);wk.setDate(wk.getDate()+7);const ws=wk.toISOString().slice(0,10);let l=DB.tasks.slice();if(curTab==='week')l=l.filter(x=>!x.done&&(!x.due||x.due<=ws));else if(curTab==='all')l=l.filter(x=>!x.done);else if(curTab==='done')l=l.filter(x=>x.done).slice(-30).reverse();else l=l.filter(x=>!x.done&&x.cat===curTab);l.sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;return(a.due||'9999')<(b.due||'9999')?-1:1;});return l;}

// ── Activity Log helpers ──
function prevWeekLogs(){
  const d=new Date(today);d.setDate(d.getDate()-d.getDay()-7);
  const ws=d.toISOString().slice(0,10);
  // 今週と同じ経過日数分だけ比較（週途中 vs フル週にならないよう）
  const sameDayPrev=new Date(d);sameDayPrev.setDate(d.getDate()+dayOfWeek+1);
  const we=sameDayPrev.toISOString().slice(0,10);
  return (DB.timerLog||[]).filter(l=>l.date>=ws&&l.date<we);
}
function logsByCat(logs){
  const m={};logs.forEach(l=>{m[l.cat]=(m[l.cat]||0)+l.sec;});return m;
}
let showAllSessions=false;

function renderLog(){
  const logs=DB.timerLog||[];
  if(!logs.length){$('#actLog').innerHTML='<div style="text-align:center;padding:.5rem;color:var(--t3);font-size:.6rem">タイマーで作業を記録すると、ここに分析が表示されます</div><div class="al-add-btn" id="alAddBtn" style="text-align:center;margin:.3rem 0">＋ 手動追加</div>';const ab=$('#alAddBtn');if(ab)ab.addEventListener('click',()=>openModal('log'));return;}

  const thisW=weekByCat();
  const prevW=logsByCat(prevWeekLogs());
  const thisTotal=Object.values(thisW).reduce((a,b)=>a+b,0);
  const prevTotal=Object.values(prevW).reduce((a,b)=>a+b,0);
  const diff=prevTotal>0?Math.round((thisTotal-prevTotal)/prevTotal*100):0;
  const cmpCls=diff>0?'up':diff<0?'down':'flat';
  const cmpText=diff>0?`▲ ${diff}% vs 先週同時点`:diff<0?`▼ ${Math.abs(diff)}% vs 先週同時点`:'± 先週同時点と同等';

  const allCats=[...new Set([...Object.keys(thisW),...Object.keys(prevW)])];
  const maxSec=Math.max(1,...allCats.map(c=>Math.max(thisW[c]||0,prevW[c]||0)));

  let bars=allCats.sort((a,b)=>(thisW[b]||0)-(thisW[a]||0)).map(c=>{
    const tw=thisW[c]||0,pw=prevW[c]||0;
    const wThis=Math.max(1,Math.round(tw/maxSec*100));
    const wPrev=Math.max(1,Math.round(pw/maxSec*100));
    return `<div class="al-row"><div class="al-cat">${c}</div><div style="flex:1"><div class="al-fill" style="width:${wThis}%"></div>${pw>0?'<div class="al-fill prev" style="width:'+wPrev+'%;margin-top:1px"></div>':''}</div><div class="al-dur">${fmtTime(tw)}</div></div>`;
  }).join('');

  const recent=logs.slice().reverse();
  const shown=showAllSessions?recent.slice(0,30):recent.slice(0,5);
  let sessions=shown.map((l,j)=>{
    const idx=logs.length-1-j;
    const d=new Date(l.ts||Date.now());
    const hm=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    return `<div class="al-s"><div class="al-s-date">${l.date.slice(5)} ${l.manual?'手動':hm}</div><div class="al-s-cat">${l.cat}</div><div class="al-s-time">${fmtTime(l.sec)}</div><div class="al-s-edit" data-li="${idx}">✎</div><div class="al-s-del" data-li="${idx}">✕</div></div>`;
  }).join('');

  const toggleBtn=recent.length>5?`<div class="al-toggle" id="alToggle">${showAllSessions?'▲ 閉じる':'▼ もっと見る ('+recent.length+'件)'}</div>`:'';

  $('#actLog').innerHTML=`<div class="al-week"><div class="al-label">今週 ${fmtTime(thisTotal)}</div><div style="display:flex;gap:.4rem;align-items:center"><div class="al-cmp ${cmpCls}">${cmpText}</div><div class="al-add-btn" id="alAddBtn">＋ 手動追加</div></div></div><div class="al-bars">${bars}</div><div style="font-size:.42rem;color:var(--t3);display:flex;gap:.6rem;margin-bottom:.3rem"><span>■ 今週</span><span style="opacity:.5">■ 先週</span></div><div class="al-sessions">${sessions}</div>${toggleBtn}`;

  const tb=$('#alToggle');
  if(tb)tb.addEventListener('click',()=>{showAllSessions=!showAllSessions;renderLog();});
  const ab=$('#alAddBtn');
  if(ab)ab.addEventListener('click',()=>openModal('log'));
  $('#actLog').querySelectorAll('.al-s-edit').forEach(el=>{
    const go=()=>{const idx=+el.dataset.li;if(idx>=0&&DB.timerLog[idx])openModal('logEdit',idx);};
    el.addEventListener('click',e=>{e.stopPropagation();e.preventDefault();go();});
    el.addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();go();},{passive:false});
  });
  $('#actLog').querySelectorAll('.al-s-del').forEach(el=>{
    const go=()=>{showConfirm('この記録を削除しますか？',()=>{const idx=+el.dataset.li;if(idx>=0)DB.timerLog.splice(idx,1);save();render();});};
    el.addEventListener('click',e=>{e.stopPropagation();e.preventDefault();go();});
    el.addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();go();},{passive:false});
  });
}


// ── Weekly Review Engine ──
function renderWeeklyReview(){
  const S=SONGS(),G=DB.goals||DEF_GOALS;
  const thisW=weekByCat(),prevW=logsByCat(prevWeekLogs());
  const thisTotal=Object.values(thisW).reduce((a,b)=>a+b,0);
  const prevTotal=Object.values(prevW).reduce((a,b)=>a+b,0);
  const goalSec=G.weeklyHours*3600;
  const released=S.filter(s=>s.status==='released').length;
  const cur=S.find(s=>s.status==='in_progress');
  const weeksElapsed=Math.max(1,Math.ceil(dayN/7));
  const expectedSongs=G.yearSongs/52*weeksElapsed;
  const doneTasks=DB.tasks.filter(t=>t.done&&t.doneDate>=new Date(new Date(today).setDate(today.getDate()-today.getDay())).toISOString().slice(0,10)).length;
  const musicCats=['🎵作曲','🎛️MIX','🎬MV','🎤ボーカル','🚀リリース'];
  const musicTime=Object.entries(thisW).filter(([c])=>musicCats.some(mc=>c.includes(mc))).reduce((s,[,v])=>s+v,0);
  const neutralCats=['💼コンサル','🎓JBG','仕事'];
  const neutralTime=Object.entries(thisW).filter(([c])=>neutralCats.some(n=>c.includes(n))).reduce((s,[,v])=>s+v,0);

  let items=[];

  // Time achievement
  if(thisTotal>=goalSec)items.push({c:'good',t:`<b>${fmtTime(thisTotal)}</b> / ${G.weeklyHours}h 目標達成 ✓`});
  else{const remain=goalSec-thisTotal;const daysLeft=7-dayOfWeek;items.push({c:'warn',t:`今週 <b>${fmtTime(thisTotal)}</b> / ${G.weeklyHours}h — 残り${daysLeft}日で <b>${fmtTime(remain)}</b> 必要`});}

  // vs last week
  if(prevTotal>0){const diff=Math.round((thisTotal-prevTotal)/prevTotal*100);items.push({c:diff>=0?'good':'warn',t:`先週同時点比 <b>${diff>=0?'+':''}${diff}%</b> (${fmtTime(prevTotal)} → ${fmtTime(thisTotal)})`});}

  // 音楽活動内の比率分析（コンサル・JBG除外した上で、音楽カテゴリ間の比率を見る）
  const musicBreakdown={};
  musicCats.forEach(mc=>{
    const sec=Object.entries(thisW).filter(([c])=>c.includes(mc)).reduce((s,[,v])=>s+v,0);
    if(sec>0)musicBreakdown[mc]=sec;
  });
  const totalMusicSec=Object.values(musicBreakdown).reduce((s,v)=>s+v,0);
  if(totalMusicSec>3600){
    // 最も多いカテゴリと最も少ないカテゴリ
    const sorted=Object.entries(musicBreakdown).sort((a,b)=>b[1]-a[1]);
    const topMcat=sorted[0];
    const missingMcats=musicCats.filter(mc=>!musicBreakdown[mc]);
    const breakdown=sorted.map(([c,s])=>`${c.split(/[a-zA-Z\s]/)[0]}${Math.round(s/totalMusicSec*100)}%`).join(' ');
    items.push({c:'tip',t:`音楽内訳: ${breakdown}`});
    // 偏り警告
    if(topMcat&&topMcat[1]/totalMusicSec>0.7)items.push({c:'warn',t:`<b>${topMcat[0]}</b>に${Math.round(topMcat[1]/totalMusicSec*100)}%集中 — 他工程も進めよう`});
    if(missingMcats.length)items.push({c:'tip',t:`今週未着手: ${missingMcats.join(' ')} — 制作フロー全体を回そう`});
  }

  // 睡眠アラート
  const wkStart0=new Date(today);wkStart0.setDate(today.getDate()-dayOfWeek);
  const wkStartStr0=wkStart0.toISOString().slice(0,10);
  const weekRefs0=(DB.reflections||[]).filter(r=>r.date>=wkStartStr0&&r.date<=todayStr&&r.sleep!=null&&r.sleep<=24);
  if(weekRefs0.length>0){
    const avgSleep=weekRefs0.reduce((s,r)=>s+r.sleep,0)/weekRefs0.length;
    if(avgSleep<6)items.push({c:'warn',t:`⚠️ 今週の平均睡眠 <b>${avgSleep.toFixed(1)}h</b> — 睡眠不足が効率に影響している可能性`});
    else if(avgSleep<7)items.push({c:'tip',t:`😴 平均睡眠 <b>${avgSleep.toFixed(1)}h</b> — あと1時間増やすと集中力が上がる`});
    else items.push({c:'good',t:`😴 平均睡眠 <b>${avgSleep.toFixed(1)}h</b> — 良好`});
  }

  // Pace
  if(released<Math.floor(expectedSongs))items.push({c:'warn',t:`ペース遅れ: <b>${released}曲</b> / 期待 ${Math.round(expectedSongs*10)/10}曲 — 制作加速が必要`});
  else items.push({c:'good',t:`ペース順調: <b>${released}曲</b> リリース済`});

  // Tasks completed
  items.push({c:doneTasks>=3?'good':'tip',t:`今週 <b>${doneTasks}タスク</b> 完了${doneTasks<3?' — タスクを小さく分割して達成感を':''}`});

  // Category balance tip
  const topCat=Object.entries(thisW).sort((a,b)=>b[1]-a[1])[0];
  const zeroCats=musicCats.filter(mc=>!Object.keys(thisW).some(k=>k.includes(mc)));
  if(zeroCats.length&&thisTotal>3600)items.push({c:'tip',t:`未着手カテゴリ: ${zeroCats.join(', ')} — ${cur?'「'+cur.title+'」の':''}次のステージに進める？`});

  // Current song advice
  if(cur){const stageIdx=(DB.songStages&&DB.songStages[cur.title])||DB.songStage||0;const nextDeadline=cur.date?Math.ceil((new Date(cur.date)-today)/864e5):null;if(nextDeadline!=null&&nextDeadline<=14)items.push({c:'tip',t:`「${cur.title}」リリースまで <b>${nextDeadline}日</b> — ${STAGES[stageIdx]}を今週中に完了させよう`});}

  // Mood trend (this week)
  const moods=['😤','😐','🙂','😊','🔥'];
  const weekStart=new Date(today);weekStart.setDate(today.getDate()-dayOfWeek);
  const weekStartStr=weekStart.toISOString().slice(0,10);
  const weekRefs=(DB.reflections||[]).filter(r=>r.date>=weekStartStr&&r.date<=todayStr);
  if(weekRefs.length>=2){
    const avgMood=weekRefs.reduce((s,r)=>s+(r.mood||0),0)/weekRefs.length;
    const trend=moods[Math.round(avgMood)];
    const moodLabel=['しんどい週','普通の週','良い週','充実した週','最高の週'][Math.round(avgMood)];
    items.push({c:avgMood>=3?'good':avgMood>=2?'tip':'warn',t:`今週の気分: ${weekRefs.map(r=>moods[r.mood||0]).join(' ')} → <b>${trend} ${moodLabel}</b>`});
  }

  // SNS入力欄
  const ws2=getWeekStart();
  if(!DB.snsLog)DB.snsLog=[];
  const thisSns=DB.snsLog.find(s=>s.weekStart===ws2)||{weekStart:ws2,x:0,nn:0};
  if(!DB.snsLog.find(s=>s.weekStart===ws2))DB.snsLog.push(thisSns);
  const snsHtml=`<div class="wr-item tip" style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
    <span style="flex:1;min-width:5rem">📱 今週の投稿数</span>
    <span style="font-size:.5rem;color:var(--t3)">X</span>
    <input id="xCount" type="number" min="0" value="${thisSns.x||0}" style="width:2.5rem;background:var(--s2);border:1px solid rgba(255,255,255,.1);border-radius:4px;color:var(--t1);font-size:.6rem;padding:.1rem .3rem;text-align:center">
    <span style="font-size:.5rem;color:var(--t3)">ニコニコ</span>
    <input id="nnCount" type="number" min="0" value="${thisSns.nn||0}" style="width:2.5rem;background:var(--s2);border:1px solid rgba(255,255,255,.1);border-radius:4px;color:var(--t1);font-size:.6rem;padding:.1rem .3rem;text-align:center">
  </div>`;
  $('#weeklyReview').innerHTML=`<div class="wr"><div class="wr-head">📊 Week ${Math.ceil(dayN/7)} — ${todayStr.slice(5)} 時点</div>${items.map(i=>`<div class="wr-item ${i.c}">${i.t}</div>`).join('')}${snsHtml}</div>`;
  ['x','nn'].forEach(k=>{
    const el=$('#'+k+'Count');
    if(el)el.addEventListener('change',()=>{thisSns[k]=+el.value;save();});
  });
}

function recordDay(){if(!DB.days.includes(todayStr))DB.days.push(todayStr);}
function streak(){const d=new Set(DB.days);let s=0,dt=new Date(today);while(true){const k=dt.toISOString().slice(0,10);if(d.has(k)){s++;dt.setDate(dt.getDate()-1);}else if(s===0){dt.setDate(dt.getDate()-1);}else break;}return s;}
function days30(){const c=new Date(today);c.setDate(c.getDate()-30);return DB.days.filter(x=>new Date(x)>=c).length;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ── Suggestion Panel ──
function renderSuggestions(){
  const ws=getWeekStart();
  const sugs=DB.suggestionLog.filter(s=>s.weekStart===ws);
  if(!sugs.length){$('#suggestionPanel').innerHTML='';return;}
  const items=sugs.map(s=>`<div class="wr-item tip" style="display:flex;justify-content:space-between;align-items:flex-start;gap:.3rem"><span>💡 ${s.text}</span></div>`).join('');
  $('#suggestionPanel').innerHTML=`<div class="wr"><div class="wr-head">🎯 今週のアクション提案</div>${items}</div>`;

// ── Comp Flow Section ──
function cfInitActiveSong(){
  const songs=(DB.songs||[]).filter(s=>s.title);
  if(!songs.length)return 0;
  let best=0,bestDate='';
  songs.forEach((s,i)=>{
    const cf=DB.compFlow?.[s.title];
    const dates=cf?.dates?Object.values(cf.dates):[];
    const latest=dates.length?dates.reduce((a,b)=>a>b?a:b):'';
    if(latest>bestDate){bestDate=latest;best=i;}
  });
  return best;
}
let cfActiveSong=cfInitActiveSong();
function cfRemap(oldDone,oldDates,mapFn){
  const nd=new Set(),ndt={};
  oldDone.forEach(idx=>{const ni=mapFn(idx);if(ni!=null)nd.add(ni);});
  Object.keys(oldDates).forEach(k=>{const ni=mapFn(+k);if(ni!=null)ndt[ni]=oldDates[k];});
  return{done:[...nd],dates:ndt};
}
function renderCompFlow(){
  const el=$('#compFlowSection');if(!el)return;
  const songs=(DB.songs||[]).filter(s=>s.title);
  if(!songs.length){el.innerHTML='<div style="font-size:.6rem;color:var(--t3);text-align:center;padding:.5rem">曲をJourneyに登録すると使えます</div>';return;}
  if(cfActiveSong>=songs.length)cfActiveSong=0;
  const song=songs[cfActiveSong];
  const key=song.title;
  if(!DB.compFlow[key])DB.compFlow[key]={steps:[...CF_STEPS],done:[],dates:{}};
  const cf=DB.compFlow[key];
  if(!cf.dates)cf.dates={};
  if(!cf.steps||!cf.steps.length)cf.steps=[...CF_STEPS];
  const steps=cf.steps;
  const doneSet=new Set(cf.done);
  const pct=Math.round(doneSet.size/steps.length*100);
  const tabs=songs.map((s,i)=>`<span class="tab ${i===cfActiveSong?'active':''}" data-cfi="${i}" style="font-size:.5rem">${s.title}</span>`).join('');
  const stepHtml=steps.map((s,i)=>{
    const done=doneSet.has(i);
    const date=cf.dates[i]||'';
    const dateHtml=done?`<span class="cf-date" data-di="${i}">${date?date.slice(5):'--'}</span>`:'';
    return`<div class="cf-step ${done?'done-step':''}" data-ci="${i}"><div class="cf-drag" data-drag="${i}">☰</div><div class="cf-ck"></div><div class="cf-num">${i+1}</div><div class="cf-text" data-ei="${i}">${s}</div>${dateHtml}<div class="cf-del" data-xi="${i}">✕</div></div>`;
  }).join('');
  el.innerHTML=`<div class="tabs" id="cfTabs">${tabs}</div><div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem"><div class="cf-prog" style="flex:1;margin:0"><div class="cf-prog-fill" style="width:${pct}%"></div></div><span id="cfPctLabel" style="font-size:.5rem;color:var(--t3);white-space:nowrap">${doneSet.size}/${steps.length} (${pct}%)</span></div><div id="cfSteps">${stepHtml}</div><div style="display:flex;gap:.3rem;margin-top:.4rem"><input id="cfNewStep" placeholder="ステップを追加..." style="flex:1;background:var(--s1);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:.3rem .5rem;color:var(--t1);font-size:.6rem;font-family:inherit;outline:none"><button id="cfAddBtn" style="padding:.3rem .6rem;background:var(--gold);color:var(--bg);border:none;border-radius:6px;font-size:.6rem;font-weight:600;cursor:pointer;font-family:inherit">＋</button></div>`;
  el.querySelectorAll('[data-cfi]').forEach(t=>t.addEventListener('click',()=>{cfActiveSong=+t.dataset.cfi;renderCompFlow();}));
  el.querySelectorAll('.cf-ck').forEach(ck=>ck.addEventListener('click',e=>{
    e.stopPropagation();
    const i=+ck.closest('.cf-step').dataset.ci;
    const wasDone=doneSet.has(i),wasDate=cf.dates[i];
    if(wasDone){doneSet.delete(i);delete cf.dates[i];}else{doneSet.add(i);cf.dates[i]=todayStr;}
    cf.done=[...doneSet];save();
    pushUndo(wasDone?'完了を解除しました':'ステップを完了にしました',()=>{
      if(wasDone){doneSet.add(i);cf.dates[i]=wasDate;}else{doneSet.delete(i);delete cf.dates[i];}
      cf.done=[...doneSet];save();renderCompFlow();
    });
    renderCompFlow();
  }));
  el.querySelectorAll('.cf-text').forEach(txt=>txt.addEventListener('click',e=>{
    e.stopPropagation();
    const i=+txt.dataset.ei;
    const inp=document.createElement('input');
    inp.value=cf.steps[i];
    inp.style.cssText='flex:1;background:var(--s2);border:1px solid var(--gold);border-radius:4px;color:var(--t1);font-size:.6rem;padding:.1rem .3rem;font-family:inherit;outline:none;min-width:0;width:100%';
    txt.replaceWith(inp);inp.focus();inp.select();
    const commit=()=>{const v=inp.value.trim();if(v)cf.steps[i]=v;save();renderCompFlow();};
    inp.addEventListener('blur',commit);
    inp.addEventListener('keydown',e2=>{if(e2.key==='Enter')commit();if(e2.key==='Escape'){renderCompFlow();}});
  }));
  el.querySelectorAll('.cf-date').forEach(d=>d.addEventListener('click',e=>{e.stopPropagation();openCfDateEdit(d,+d.dataset.di,cf);}));
  el.querySelectorAll('.cf-del').forEach(d=>d.addEventListener('click',e=>{
    e.stopPropagation();const i=+d.dataset.xi;cf.steps.splice(i,1);
    const{done,dates}=cfRemap(doneSet,cf.dates,idx=>idx<i?idx:idx>i?idx-1:null);
    cf.done=done;cf.dates=dates;save();renderCompFlow();
  }));
  // ── Drag & Drop (document-level pointer events) ──
  const stepsEl=el.querySelector('#cfSteps');
  el.querySelectorAll('.cf-drag').forEach(handle=>{
    handle.addEventListener('pointerdown',e=>{
      e.preventDefault();e.stopPropagation();
      const from=+handle.dataset.drag;
      const dragRow=handle.closest('.cf-step');
      dragRow.classList.add('cf-dragging');
      const getClientY=e=>e.touches?e.touches[0].clientY:e.clientY;
      const highlight=cy=>{
        stepsEl.querySelectorAll('.cf-drop-here').forEach(r=>r.classList.remove('cf-drop-here'));
        const rows=[...stepsEl.querySelectorAll('.cf-step:not(.cf-dragging)')];
        for(const r of rows){if(cy<r.getBoundingClientRect().top+r.offsetHeight/2){r.classList.add('cf-drop-here');break;}}
      };
      const onMove=e=>{e.preventDefault();highlight(getClientY(e));};
      const onUp=e=>{
        document.removeEventListener('pointermove',onMove,{passive:false});
        document.removeEventListener('pointerup',onUp);
        const cy=getClientY(e);
        const rows=[...stepsEl.querySelectorAll('.cf-step:not(.cf-dragging)')];
        let insertBeforeCI=null;
        rows.forEach(r=>r.classList.remove('cf-drop-here'));
        for(const r of rows){if(cy<r.getBoundingClientRect().top+r.offsetHeight/2){insertBeforeCI=+r.dataset.ci;break;}}
        dragRow.classList.remove('cf-dragging');
        let newIdx=rows.length;
        if(insertBeforeCI!==null)newIdx=insertBeforeCI<from?insertBeforeCI:insertBeforeCI-1;
        if(newIdx!==from){
          const[moved]=cf.steps.splice(from,1);cf.steps.splice(newIdx,0,moved);
          const{done,dates}=cfRemap(cf.done,cf.dates,idx=>{
            if(idx===from)return newIdx;
            if(from<newIdx&&idx>from&&idx<=newIdx)return idx-1;
            if(from>newIdx&&idx>=newIdx&&idx<from)return idx+1;
            return idx;
          });
          cf.done=done;cf.dates=dates;save();
        }
        renderCompFlow();
      };
      document.addEventListener('pointermove',onMove,{passive:false});
      document.addEventListener('pointerup',onUp);
    });
  });
  const addBtn=$('#cfAddBtn'),addInp=$('#cfNewStep');
  const doAdd=()=>{const txt=addInp.value.trim();if(!txt)return;cf.steps.push(txt);save();addInp.value='';renderCompFlow();};
  addBtn.addEventListener('click',doAdd);
  addInp.addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();});
}

// ── Monthly Review ──
function renderMonthlyReview(){
  const el=$('#monthlyReview');
  if(!el)return;
  const G=DB.goals||DEF_GOALS;
  const now=new Date(today);
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10);
  const prevMonthStart=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString().slice(0,10);
  const logs=DB.timerLog||[];
  const thisMonthLogs=logs.filter(l=>l.date>=monthStart);
  const prevMonthLogs=logs.filter(l=>l.date>=prevMonthStart&&l.date<monthStart);
  const thisH=thisMonthLogs.reduce((s,l)=>s+l.sec,0)/3600;
  const prevH=prevMonthLogs.reduce((s,l)=>s+l.sec,0)/3600;
  const diff=prevH>0?Math.round((thisH-prevH)/prevH*100):0;

  // KPI growth (from kpiLog)
  const kpiNow=DB.kpiLog.filter(e=>e.date>=monthStart).slice(-1)[0];
  const kpiPrev=DB.kpiLog.filter(e=>e.date>=prevMonthStart&&e.date<monthStart).slice(-1)[0];
  const subGrowth=kpiNow&&kpiPrev?kpiNow.subscribers-kpiPrev.subscribers:null;
  const playGrowth=kpiNow&&kpiPrev?kpiNow.total_plays-kpiPrev.total_plays:null;

  // Suggestion effectiveness this month
  const monthSugs=DB.suggestionLog.filter(s=>s.weekStart>=monthStart&&s.effective!==null);
  const effectivePct=monthSugs.length?Math.round(monthSugs.filter(s=>s.effective).length/monthSugs.length*100):null;

  let items=[];
  items.push({c:thisH>prevH?'good':'warn',t:`今月の作業: <b>${thisH.toFixed(1)}h</b>${prevH>0?' (先月比 '+(diff>=0?'+':'')+diff+'%)':''}`});
  if(subGrowth!==null)items.push({c:subGrowth>0?'good':'warn',t:`登録者: ${subGrowth>=0?'+':''}${subGrowth}人 (今月)`});
  if(playGrowth!==null)items.push({c:playGrowth>0?'good':'warn',t:`再生数: ${playGrowth>=0?'+':''}${playGrowth.toLocaleString()} (今月)`});
  if(effectivePct!==null)items.push({c:effectivePct>=50?'good':'warn',t:`提案の効果率: <b>${effectivePct}%</b> (${monthSugs.length}件評価済)`});

  el.innerHTML=`<div class="wr"><div class="wr-head">📅 月次サマリー — ${now.getMonth()+1}月</div>${items.map(i=>`<div class="wr-item ${i.c}">${i.t}</div>`).join('')}</div>`;
}

// ── Intelligent Focus Engine ──
function calcFocus(){
  const S=SONGS(),G=DB.goals||DEF_GOALS;
  const cur=S.find(s=>s.status==='in_progress');
  const _curSong=SONGS().find(s=>s.status==='in_progress');
  const stage=STAGES[(_curSong&&DB.songStages&&DB.songStages[_curSong.title])||DB.songStage||0];
  const overdue=DB.tasks.filter(x=>!x.done&&x.due&&x.due<todayStr).sort((a,b)=>a.due<b.due?-1:1);
  const urgent3=DB.tasks.filter(x=>!x.done&&x.due&&!overdue.includes(x)).filter(x=>{const d=Math.ceil((new Date(x.due)-today)/864e5);return d<=3;}).sort((a,b)=>a.due<b.due?-1:1);
  const wt=weekTotal(),goalSec=G.weeklyHours*3600;
  const bc=weekByCat();
  const released=S.filter(s=>s.status==='released').length;
  const weeksElapsed=Math.max(1,Math.ceil(dayN/7));
  const expectedSongs=G.yearSongs/52*weeksElapsed;
  const behindPace=released<Math.floor(expectedSongs);
  const sk=streak();
  const musicCats=['🎵作曲','🎛️MIX','🎬MV','🎤ボーカル','🚀リリース'];
  const musicTime=Object.entries(bc).filter(([c])=>musicCats.some(mc=>c.includes(mc))).reduce((s,[,v])=>s+v,0);
  const neutralCats=['💼コンサル','🎓JBG','仕事'];
  const neutralTime=Object.entries(bc).filter(([c])=>neutralCats.some(n=>c.includes(n))).reduce((s,[,v])=>s+v,0);
  const nonMusicTime=Math.max(0,wt-musicTime-neutralTime);

  // Priority decision tree
  if(overdue.length){return{text:overdue[0].text,sub:`⚠️ ${overdue.length}件の期限超過タスク — 最優先`,color:'red'};}
  if(urgent3.length){return{text:urgent3[0].text,sub:`⚡ あと${Math.ceil((new Date(urgent3[0].due)-today)/864e5)}日 — 早めに対応`,color:'warn'};}
  if(behindPace&&cur){return{text:`「${cur.title}」を加速 — ${stage}`,sub:`📉 ペース遅れ: ${released}曲 / 期待${Math.round(expectedSongs*10)/10}曲。制作を優先`,color:'warn'};}
  if(wt<goalSec*0.3&&dayOfWeek>=4){return{text:'今週の作業時間が足りない',sub:`⏱ ${fmtTime(wt)} / ${G.weeklyHours}h — 残り${7-dayOfWeek}日で${fmtTime(goalSec-wt)}必要`,color:'warn'};}
  if(nonMusicTime>musicTime*2&&wt>3600){return{text:'音楽以外に時間を使いすぎ',sub:`🎵 音楽: ${fmtTime(musicTime)} vs その他: ${fmtTime(nonMusicTime)} — バランスを見直そう`,color:'warn'};}
  if(sk===0){return{text:'今日の活動を始めよう',sub:'🔥 ストリークが途切れている — 小さくてもいいから1つ',color:'gold'};}
  if(cur){return{text:`「${cur.title}」${stage}`,sub:`${STAGES.indexOf(stage)+1}/${STAGES.length} ステージ${sk>0?' · 🔥'+sk+'日連続':''}`,color:'gold'};}
  return{text:'新しい曲を始めよう',sub:`${released}曲リリース済 — 次の一歩を`,color:'gold'};
}

// ── Asset Section ──
function parseCSVRow(line){const r=[];let cur='',inQ=false;for(const c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){r.push(cur);cur='';}else cur+=c;}r.push(cur);return r;}

function parseSBICSV(buf){
  const text=new TextDecoder('shift-jis').decode(new Uint8Array(buf));
  const lines=text.split(/\r?\n/).map(l=>l.trim());
  const funds=[];let sec='',inData=false;
  for(const line of lines){
    if(!line){inData=false;continue;}
    if(line.includes('NISA')&&!line.includes(',')&&!line.startsWith('"')){sec=line;inData=false;continue;}
    if(line.startsWith('ファンド名')||line.startsWith('"ファンド名')){inData=true;continue;}
    if(!line.startsWith('"'))continue;
    if(inData){
      const p=parseCSVRow(line);
      if(p.length>=8){
        const name=p[0].replace(/^"|"$/g,'');
        const cost=parseInt((p[5]||'').replace(/[^0-9]/g,''))||0;
        const value=parseInt((p[6]||'').replace(/[^0-9]/g,''))||0;
        const gStr=(p[7]||'').replace(/[^0-9+\-]/g,'');
        const gain=gStr.startsWith('-')?-parseInt(gStr.slice(1)):parseInt(gStr.replace('+',''))||0;
        if(name&&value>0)funds.push({name,cost,value,gain,section:sec,importDate:todayStr});
      }
    }
  }
  return funds;
}

function calcMonthlyInvest(salary){
  // 年間投資額 = 手取り(×0.72) − 生活費(372万)
  // ボーナス全額を年12分割で均等積立
  const annual=Math.max(0,Math.round(salary*0.72-3720000));
  const monthly=Math.round(annual/12);
  return {monthly,annual};
}

function getWeekKey(d){const dt=new Date(d);const day=dt.getDay();const mon=new Date(dt);mon.setDate(dt.getDate()-(day===0?6:day-1));return localDateStr(mon);}
function getMonthKey(d){return new Date(d).toISOString().slice(0,7);}

function renderCommitments(){
  const el=$('#commitSection');if(!el)return;
  const commits=DB.commitments||[];
  const todayKey=todayStr;
  const weekKey=getWeekKey(today);
  const monthKey=getMonthKey(today);
  let html='';
  commits.forEach((c,ci)=>{
    const key=c.freq==='weekly'?weekKey:monthKey;
    const checked=c.history.find(h=>h.date===key);
    const kept=checked?.kept;
    // 残り期間
    let deadlineStr='';
    if(c.deadline){
      const dl=new Date(c.deadline+'-01');
      const diff=(dl-today)/(1000*60*60*24*30.4);
      const mos=Math.max(0,Math.round(diff));
      deadlineStr=`<span style="font-size:.42rem;color:rgba(255,255,255,.3)">残り${mos}ヶ月</span>`;
    }
    // 直近12件の履歴ドット
    const recent=c.history.slice(-12);
    const dots=recent.map(h=>`<span style="width:6px;height:6px;border-radius:50%;background:${h.kept?'#6abf8a':'#D47A6A'};display:inline-block"></span>`).join('');
    // 達成率
    const total=c.history.length;
    const keptN=c.history.filter(h=>h.kept).length;
    const rate=total>0?Math.round(keptN/total*100):'-';
    html+=`<div style="background:var(--s1);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:.5rem .7rem;margin:.3rem 0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem">
        <div>
          <div style="font-size:.55rem;font-weight:600;color:var(--t1)">${c.text}</div>
          <div style="font-size:.42rem;color:var(--t3);margin-top:.1rem">${c.freq==='weekly'?'週次':'月次'}チェック　${deadlineStr}</div>
        </div>
        <div style="font-size:.7rem;font-weight:700;color:${rate==='-'?'var(--t3)':rate>=80?'#6abf8a':rate>=50?'#C4A059':'#D47A6A'}">${rate}${rate==='-'?'':'%'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:.3rem;margin-bottom:.4rem;flex-wrap:wrap">${dots||'<span style="font-size:.42rem;color:var(--t3)">履歴なし</span>'}</div>
      ${checked?`<div style="font-size:.45rem;color:${kept?'#6abf8a':'#D47A6A'};text-align:center;padding:.25rem;background:rgba(255,255,255,.04);border-radius:6px">${kept?'✓ 守れた':'✗ 守れなかった'}（${c.freq==='weekly'?'今週':'今月'}記録済み）</div>`
      :`<div style="display:flex;gap:.4rem">
          <button class="commit-btn kept" data-ci="${ci}" data-key="${key}" data-kept="1" style="flex:1;padding:.35rem;border-radius:7px;border:1px solid #6abf8a;background:rgba(106,191,138,.1);color:#6abf8a;font-size:.52rem;cursor:pointer">✓ 守れた</button>
          <button class="commit-btn broke" data-ci="${ci}" data-key="${key}" data-kept="0" style="flex:1;padding:.35rem;border-radius:7px;border:1px solid #D47A6A;background:rgba(212,122,106,.1);color:#D47A6A;font-size:.52rem;cursor:pointer">✗ 守れなかった</button>
        </div>`}
    </div>`;
  });
  el.innerHTML=html;
  el.querySelectorAll('.commit-btn').forEach(btn=>{
    btn.onclick=()=>{
      const ci=+btn.dataset.ci,key=btn.dataset.key,kept=btn.dataset.kept==='1';
      const c=DB.commitments[ci];
      c.history=c.history.filter(h=>h.date!==key);
      c.history.push({date:key,kept});
      saveDB();renderCommitments();
    };
  });
}

function renderAsset(){
  const el=$('#assetSection');
  const funds=DB.assetPortfolio||[];
  const salary=DB.assetConfig?.salary||9800000;
  const BIRTH=new Date('1996-06-01');
  const ageNow=(today-BIRTH)/(365.25*86400000);
  const yearsLeft=Math.max(0,38-ageNow);
  const TARGET=55000000;

  // Portfolio allocation by age
  const PALETTE=['#C4A059','#6abf8a','#7EB8D4','#D4896A','#9B8FD4','#D4C06A','#6ABDB4','#D47A6A'];
  const portfolio=ageNow<35?[{name:'NASDAQ100',pct:70},{name:'FANG+',pct:30}]:ageNow<38?[{name:'オルカン',pct:50},{name:'NASDAQ100',pct:50}]:[{name:'オルカン',pct:70},{name:'債券',pct:30}];

  // Donut chart SVG
  function donutChart(items,size=72){
    const R=28,cx=size/2,cy=size/2,circ=2*Math.PI*R;
    let offset=0,segs='';
    items.forEach((item,i)=>{
      const len=circ*item.pct/100;
      segs+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${PALETTE[i%PALETTE.length]}" stroke-width="10" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
      offset+=len;
    });
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${segs}<circle cx="${cx}" cy="${cy}" r="18" fill="var(--bg)"/></svg>`;
  }

  // Salary input + monthly recommendation
  const inv=calcMonthlyInvest(salary);
  const monthlyInvest=inv.monthly;
  // ポートフォリオ比率で各ファンドの目標額 + NISA枠内訳を計算
  const TSUMITATE_MAX=100000;const SEICH_MAX=200000;
  const fundTargets=portfolio.map(p=>({name:p.name,target:Math.round(monthlyInvest*p.pct/100),color:PALETTE[portfolio.indexOf(p)%PALETTE.length]}));
  function calcFundNisa(targets){
    // FANG+(名前にFANGを含む) → 積立枠のみ
    // NASDAQ100 → 成長枠のみ
    // それ以外 → 積立→成長→特定の順
    const nisa=targets.map(()=>({tsumitate:0,seichi:0,tokutei:0}));
    let tl=TSUMITATE_MAX,sl=SEICH_MAX;
    targets.forEach((f,fi)=>{
      let rem=f.target;
      const isFang=f.name.toUpperCase().includes('FANG');
      const isNasdaq=f.name.toUpperCase().includes('NASDAQ');
      if(isFang){
        const ta=Math.min(rem,tl);if(ta>0){nisa[fi].tsumitate=ta;tl-=ta;rem-=ta;}
        if(rem>0)nisa[fi].tokutei=rem;
      }else if(isNasdaq){
        const sa=Math.min(rem,sl);if(sa>0){nisa[fi].seichi=sa;sl-=sa;rem-=sa;}
        if(rem>0)nisa[fi].tokutei=rem;
      }else{
        const ta=Math.min(rem,tl);if(ta>0){nisa[fi].tsumitate=ta;tl-=ta;rem-=ta;}
        const sa=Math.min(rem,sl);if(sa>0){nisa[fi].seichi=sa;sl-=sa;rem-=sa;}
        if(rem>0)nisa[fi].tokutei=rem;
      }
    });
    return nisa;
  }
  const fundNisa=calcFundNisa(fundTargets);
  function nisaTags(n){const t=[];if(n.tsumitate>0)t.push(`<span style="color:rgba(106,191,138,.8)">積立 ¥${n.tsumitate.toLocaleString()}</span>`);if(n.seichi>0)t.push(`<span style="color:rgba(126,184,212,.8)">成長 ¥${n.seichi.toLocaleString()}</span>`);if(n.tokutei>0)t.push(`<span style="color:rgba(255,255,255,.4)">特定 ¥${n.tokutei.toLocaleString()}</span>`);return t.join(' ');};
  let html=`<div class="asset-salary-row"><span style="font-size:.5rem;color:var(--t3);white-space:nowrap">年収</span><input class="asset-salary-inp" id="assetSalaryInp" type="number" value="${salary}" placeholder="9800000"><span style="font-size:.5rem;color:var(--t3);white-space:nowrap">円</span></div>`;
  html+=`<div class="asset-monthly"><div><div class="asset-monthly-l">月次積立額</div><div class="asset-monthly-v">¥${inv.monthly.toLocaleString()}<span style="font-size:.5rem;font-weight:400;color:var(--t3)">/月</span></div><div style="font-size:.42rem;color:var(--t3);margin-top:.12rem;line-height:1.7"><div>年間 ¥${inv.annual.toLocaleString()} ÷ 12</div><div style="color:rgba(255,255,255,.3)">= (年収×0.72 − 372万) ÷ 12</div><div style="color:rgba(255,255,255,.3)">ボーナス全額を年12分割で均等積立</div></div></div><div style="display:flex;align-items:center;gap:.5rem">${donutChart(portfolio)}<div>${portfolio.map((p,i)=>{
    const amount=Math.round(monthlyInvest*p.pct/100);
    return `<div style="margin-bottom:.35rem"><div style="display:flex;align-items:center;gap:.3rem"><span style="width:7px;height:7px;border-radius:2px;background:${PALETTE[i%PALETTE.length]};flex-shrink:0;display:inline-block"></span><span style="font-size:.48rem;color:var(--t2)">${p.name} ${p.pct}%</span></div><div style="font-size:.42rem;padding-left:1rem;margin-top:.1rem;line-height:1.6"><div><span style="color:var(--gold)">¥${amount.toLocaleString()}/月</span>　${nisaTags(fundNisa[i])}</div></div></div>`;
  }).join('')}</div></div></div>`;

  if(funds.length===0){
    html+=`<div class="asset-empty">SBIのCSVをインポートすると<br>ポートフォリオが表示されます</div>`;
  }else{
    const totalCost=funds.reduce((a,f)=>a+f.cost,0);
    const totalValue=funds.reduce((a,f)=>a+f.value,0);
    const totalGain=totalValue-totalCost;
    const gainPct=totalCost>0?((totalGain/totalCost)*100).toFixed(1):0;
    const gainCls=totalGain>=0?'plus':'minus';
    const gainSign=totalGain>=0?'+':'';
    html+=`<div class="asset-total">
      <div class="asset-tot-item"><div class="asset-l">評価額</div><div class="asset-v">¥${totalValue.toLocaleString()}</div></div>
      <div class="asset-tot-item"><div class="asset-l">損益</div><div class="asset-v asset-gain-line ${gainCls}">${gainSign}¥${totalGain.toLocaleString()}<span style="font-size:.5rem;margin-left:.2rem">(${gainSign}${gainPct}%)</span></div></div>
    </div>`;

    const ylYrs=Math.floor(yearsLeft);const ylMos=Math.round((yearsLeft-ylYrs)*12);const ylStr=ylYrs>0?`${ylYrs}年${ylMos}ヶ月`:`${ylMos}ヶ月`;
    html+=`<div class="asset-proj">
      <div class="asset-proj-row"><span style="font-size:.5rem;color:var(--t3)">予実グラフ（〜38歳）</span><span style="font-size:.5rem;color:var(--t3)">残り <b style="color:var(--t1)">${ylStr}</b></span></div>
      ${(()=>{
        const BIRTH=new Date('1996-06-01');
        const startAge=29;const endAge=38;const steps=endAge-startAge;
        const baseSalary=DB.assetConfig?.salary||9800000;
        const salaryStep=500000;const salaryCap=14000000;
        // 実績履歴
        const hist=(DB.assetHistory||[]).sort((a,b)=>a.date.localeCompare(b.date));
        // シナリオ別予測ライン
        const curAge=ageNow;
        const curVal=totalValue;
        const SCENARIOS=[
          {label:'暴落あり',prob:'20%',r1:0.08,r2:0.06,color:'#D47A6A',final:0},
          {label:'標準',    prob:'50%',r1:0.12,r2:0.10,color:'#C4A059',final:0},
          {label:'好調',    prob:'25%',r1:0.14,r2:0.12,color:'#7EB8D4',final:0},
          {label:'超強気',  prob:'5%', r1:0.16,r2:0.14,color:'#9B8FD4',final:0},
        ];
        const scenarioProjs=SCENARIOS.map(sc=>{
          const pts=[{age:curAge,value:curVal}];
          let fv=curVal;
          for(let y=0;y<10;y++){
            const projAge=curAge+y;if(projAge>=endAge)break;
            const yearsSinceBase=Math.round(projAge-startAge);
            const sal=Math.min(baseSalary+yearsSinceBase*salaryStep,salaryCap);
            const annualInvest=Math.max(0,sal*0.72-3720000);

          }
          return {...sc,pts,final:Math.round(pts[pts.length-1].value)};
        });
        const allVals=[...hist.map(h=>h.value),...scenarioProjs.flatMap(s=>s.pts.map(p=>p.value)),TARGET];
        const maxV=Math.max(...allVals)*1.05;

        // 実績ライン

        // Y軸ラベル

        // X軸ラベル（29〜38全て）

        // 現在位置マーカー

        return `<svg width="100%" viewBox="0 0 ${W} ${H+10}" style="overflow:visible;margin-top:.3rem">
          <line x1="${PAD}" y1="${ty.toFixed(1)}" x2="${W-PAD}" y2="${ty.toFixed(1)}" stroke="rgba(196,160,89,.3)" stroke-width="1" stroke-dasharray="4,3"/>

          ${actualPts?`<polyline points="${actualPts}" fill="none" stroke="#6abf8a" stroke-width="2" stroke-linejoin="round"/>`:''}
          ${hist.map(h=>{const age=(new Date(h.date)-BIRTH)/(365.25*86400000);return `<circle cx="${toX(age).toFixed(1)}" cy="${toY(h.value).toFixed(1)}" r="2.5" fill="#6abf8a"/>`;}).join('')}
          <circle cx="${nowX.toFixed(1)}" cy="${nowY.toFixed(1)}" r="3.5" fill="var(--gold)" stroke="var(--bg)" stroke-width="1.5"/>
        </svg>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.2rem .6rem;margin-top:.3rem">
