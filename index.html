          <div style="display:flex;align-items:center;gap:.3rem"><span style="width:14px;height:2px;background:#6abf8a;display:inline-block;border-radius:1px;flex-shrink:0"></span><span style="font-size:.43rem;color:var(--t3)">実績</span></div>

        </div>
        <div style="margin-top:.4rem;padding:.35rem .5rem;background:rgba(255,255,255,.03);border-radius:6px;border:1px solid rgba(255,255,255,.05)">
          <div style="font-size:.42rem;color:var(--t3);margin-bottom:.25rem;letter-spacing:.06em;text-transform:uppercase">想定条件</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.15rem .4rem;font-size:.42rem;color:rgba(255,255,255,.45);line-height:1.6">

            <div>昇給 <span style="color:rgba(255,255,255,.7)">+50万/年</span></div>
            <div>投資 <span style="color:rgba(255,255,255,.7)">ボーナス全額を年12分割均等積立</span></div>
            <div>PF <span style="color:rgba(255,255,255,.7)">NASDAQ70%+FANG+30%</span></div>
            <div>標準利回り <span style="color:rgba(255,255,255,.7)">〜35歳 12% / 以降 10%</span></div>
            <div>暴落想定 <span style="color:rgba(255,255,255,.7)">〜35歳 8% / 以降 6%</span></div>
          </div>
        </div>`;
      })()}
    </div>`;

    // Current holdings donut chart
    html+=`<div style="background:var(--s1);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:.5rem .7rem;margin:.4rem 0">
      <div style="font-size:.48rem;color:var(--t3);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.08em">現資産 構成比</div>
      <div style="display:flex;align-items:center;gap:.8rem">
        ${donutChart(funds.map((f,i)=>({name:f.name,pct:Math.round(f.value/totalValue*100)})),80)}
        <div style="flex:1">${funds.map((f,i)=>{
          const pct=(f.value/totalValue*100).toFixed(1);
          const gCls=f.gain>=0?'plus':'minus';
          const gSign=f.gain>=0?'+':'';
          const gPct=f.cost>0?((f.gain/f.cost)*100).toFixed(1):0;
          return `<div style="display:flex;align-items:center;gap:.3rem;margin-bottom:.3rem">
            <span style="width:7px;height:7px;border-radius:2px;background:${PALETTE[i%PALETTE.length]};flex-shrink:0;display:inline-block"></span>
            <div style="flex:1;min-width:0"><div style="font-size:.52rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</div>
            <div style="font-size:.45rem;color:var(--t3)">${pct}% · <span class="asset-gain-line ${gCls}">${gSign}${gPct}%</span></div></div>

    const imp=funds[0]?.importDate||'';
    if(imp)html+=`<div style="font-size:.45rem;color:var(--t3);text-align:right;margin-top:.3rem">最終取込: ${imp}</div>`;
  }
  el.innerHTML=html;

  // Salary input handler
  const si=$('#assetSalaryInp');
  if(si)si.addEventListener('change',()=>{DB.assetConfig.salary=parseInt(si.value)||9800000;save();renderAsset();});
}

    function saveApiSettings(){

      const nn={userId:$('#nnU').value.trim()};
      localStorage.setItem(GK,JSON.stringify(gist));

      localStorage.setItem(YT_KEY,JSON.stringify(yt));
      localStorage.setItem(NN_KEY,JSON.stringify(nn));
      // DBにも保存してGist同期に乗せる
      if(!DB.apiSettings)DB.apiSettings={};
      DB.apiSettings={gist,yt,nn};
      save();
    }
    $('#mSave').onclick=()=>{saveApiSettings();$('#modalBg').classList.remove('show');syncPull();fetchYT();fetchNN();};
    setTimeout(()=>{

      ['sG','sT','yK','yC','nnU'].forEach(id=>{const el=$('#'+id);if(el)el.addEventListener('blur',saveApiSettings);});
      const ex=$('#btnExport');if(ex)ex.addEventListener('click',exportData);
      const fi=$('#fileImport');if(fi)fi.addEventListener('change',e=>{if(e.target.files[0])importData(e.target.files[0]);});
      const bg=$('#btnGoals');if(bg)bg.addEventListener('click',()=>{$('#modalBg').classList.remove('show');setTimeout(()=>openModal('goals'),100);});
      const br=$('#btnRecurring');if(br)br.addEventListener('click',()=>{$('#modalBg').classList.remove('show');setTimeout(()=>openModal('recurring'),100);});
      const bcf=$('#btnCompFlow');if(bcf)bcf.addEventListener('click',()=>{$('#modalBg').classList.remove('show');setTimeout(()=>openModal('compFlow',0),100);});
      const bfu=$('#btnForceUpdate');if(bfu)bfu.addEventListener('click',async()=>{bfu.textContent='保存中...';bfu.disabled=true;try{await syncPush(true);}catch(e){}bfu.textContent='更新中...';try{if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}catch(e){}location.reload(true);});
    },50);
  }else if(type==='goodmot'){
    const entry=(DB.goodmot||[]).find(g=>g.date===todayStr)||{date:todayStr,goods:['','',''],improve:'',action:''};
    const hist=(DB.goodmot||[]).filter(g=>g.date!==todayStr).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);
    const histHtml=hist.length?`<div style="margin-top:.8rem;border-top:1px solid rgba(255,255,255,.06);padding-top:.6rem"><div style="font-size:.48rem;color:var(--t3);margin-bottom:.4rem">過去の記録</div>${hist.map(h=>`<div style="font-size:.5rem;color:var(--t2);margin-bottom:.35rem"><span style="color:var(--t3)">${h.date}</span> ${(h.goods||[]).filter(Boolean).map(g=>`✦${esc(g)}`).join(' ')}<br><span style="color:var(--gold)">改善:</span> ${esc(h.improve||h.mot||'')} <span style="color:var(--gold);margin-left:.3rem">→</span> ${esc(h.action||'')}</div>`).join('')}</div>`:'';
    $('#mTitle').textContent='Good × 3 + Mot × 1';
    $('#mFields').innerHTML=`
      <div style="font-size:.5rem;color:var(--t3);margin-bottom:.6rem">今日の「よかったこと」を3つ書き、改善と次のアクションを決める</div>
      <div class="mf"><label>Good 1</label><input id="gm1" value="${esc(entry.goods?.[0]||'')}" placeholder="よかったこと①"></div>
      <div class="mf"><label>Good 2</label><input id="gm2" value="${esc(entry.goods?.[1]||'')}" placeholder="よかったこと②"></div>
      <div class="mf"><label>Good 3</label><input id="gm3" value="${esc(entry.goods?.[2]||'')}" placeholder="よかったこと③"></div>
      <div class="mf"><label>改善（こうすればよかった）</label><input id="gm4" value="${esc(entry.improve||entry.mot||'')}" placeholder="こうすればよかった…"></div>
      <div class="mf"><label>次アクション（今日やること）</label><input id="gm5" value="${esc(entry.action||'')}" placeholder="今日やること…"></div>
      ${histHtml}`;
    $('#mSave').onclick=()=>{
      if(!DB.goodmot)DB.goodmot=[];
      const idx=DB.goodmot.findIndex(g=>g.date===todayStr);
      const rec={date:todayStr,goods:[$('#gm1').value.trim(),$('#gm2').value.trim(),$('#gm3').value.trim()],improve:$('#gm4').value.trim(),action:$('#gm5').value.trim()};
      if(idx>=0)DB.goodmot[idx]=rec;else DB.goodmot.push(rec);
      save();render();$('#modalBg').classList.remove('show');
    };
  }
  $('#modalBg').classList.add('show');
}

// SBI CSV import
$('#assetCsvInput').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const funds=parseSBICSV(ev.target.result);
      if(!funds.length){showAlert('ファンドデータが見つかりませんでした');return;}
      DB.assetPortfolio=funds;
      const totalVal=funds.reduce((a,f)=>a+f.value,0);
      if(!DB.assetHistory)DB.assetHistory=[];
      const existing=DB.assetHistory.find(h=>h.date===todayStr);
      if(existing)existing.value=totalVal;else DB.assetHistory.push({date:todayStr,value:totalVal});
      save();renderAsset();
      showAlert(`${funds.length}件のファンドを取込みました`);
    }catch(err){showAlert('CSVの読み込みに失敗しました');}
  };
  reader.readAsArrayBuffer(file);
  e.target.value='';
});

const NN_KEY='draem_nn';
function nnConf(){try{return JSON.parse(localStorage.getItem(NN_KEY))||{}}catch{return{}}}
async function fetchNN(){
  const c=nnConf();
  if(!c.userId)return;
  try{
    // GitHub Actions経由でキャッシュされたJSONを読む（CORS回避）
    const r=await fetch(`./data/niconico.json?t=${Date.now()}`);
    if(!r.ok)return;
    const d=await r.json();
    const u=d?.data?.user;
    if(!u)return;
    if(!DB.kpi.nnFollowers||DB.kpi.nnFollowers!==u.followerCount){
      DB.kpi.nnFollowers=u.followerCount||0;
      // kpiLogに追記
      const today_entry=DB.kpiLog.find(e=>e.date===todayStr);
      if(today_entry)today_entry.nnFollowers=DB.kpi.nnFollowers;
      save();render();
    }
  }catch{}
}

(function seedSuggestions(){
  const G=DB.goals||DEF_GOALS;
  const sub=DB.kpi?.subscribers||0;
  const plays=DB.kpi?.total_plays||0;
  const wt=weekTotal();
  const goalSec=G.weeklyHours*3600;
  if(sub<G.subTarget)logSuggestion(`登録者を増やすためにSNS・コンテンツ投稿を強化しよう`,'kpi_sub',{target:G.subTarget});
  if(plays<G.playTarget)logSuggestion(`再生数を増やすためにYouTube最適化（サムネ・タイトル）を見直そう`,'kpi_play',{target:G.playTarget});
  if(wt<goalSec)logSuggestion(`今週の作業時間が目標に届いていない。まず30分だけ始めよう`,'work_hours',{goalSec});
  const mCats=['🎵作曲','🎛️MIX','🎬MV','🎤ボーカル','🚀リリース'];
  const bc=weekByCat();
  const musicSec=Object.entries(bc).filter(([c])=>mCats.some(mc=>c.includes(mc))).reduce((s,[,v])=>s+v,0);
  if(wt>3600&&musicSec<wt*0.4)logSuggestion(`音楽制作の比率が低い。今週は制作時間を優先しよう`,'music_ratio',{});
  save();
})();

// ── Weekly Summary Generator ──
function buildWeeklySummary(){
  const G=DB.goals||DEF_GOALS;
  const S=SONGS();
  const wl=weekLogs();
  const pw=prevWeekLogs();
  const thisTotal=wl.filter(l=>MUSIC_CATS.some(mc=>l.cat&&l.cat.includes(mc))).reduce((s,l)=>s+l.sec,0);
  const thisTotalAll=wl.reduce((s,l)=>s+l.sec,0);
  const prevTotal=pw.reduce((s,l)=>s+l.sec,0);
  const bc=weekByCat();
  const released=S.filter(s=>s.status==='released').length;
  const cur=S.find(s=>s.status==='in_progress');
  const sk=streak();
  const pred=calcPredictions();
  const ws=getWeekStart();

  // 先週の提案と結果
  const prevWs=new Date(today);prevWs.setDate(today.getDate()-7);
  const prevWsStr=prevWs.toISOString().slice(0,10);
  const prevSugs=DB.suggestionLog.filter(s=>s.weekStart===prevWsStr);
  const prevSugSummary=prevSugs.length
    ?prevSugs.map(s=>`  - ${s.text} → ${s.effective===true?'✅効果あり':s.effective===false?'❌効果なし':'未評価'}`).join('\n')
    : '  (なし)';

  // カテゴリ別時間
  const catBreakdown=Object.entries(bc).sort((a,b)=>b[1]-a[1]).map(([c,s])=>`  ${c}: ${fmtTime(s)}`).join('\n')||'  (記録なし)';

  // 気分・睡眠トレンド
  const moods=['😤','😐','🙂','😊','🔥'];
  const weekRefs=(DB.reflections||[]).filter(r=>r.date>=ws&&r.date<=todayStr);
  const moodStr=weekRefs.length?weekRefs.map(r=>moods[r.mood||0]).join(' '):'(記録なし)';
  const sleepRefs=weekRefs.filter(r=>r.sleep!=null&&r.sleep<=24);
  const avgSleepStr=sleepRefs.length?(sleepRefs.reduce((s,r)=>s+r.sleep,0)/sleepRefs.length).toFixed(1)+'h':'(未記録)';

  // 音楽活動内訳
  const mCats=['🎵作曲','🎛️MIX','🎬MV','🎤ボーカル','🚀リリース'];
  const mCatsSum={};
  const wlByCat=wl.reduce((m,l)=>{m[l.cat]=(m[l.cat]||0)+l.sec;return m;},{});
  mCats.forEach(mc=>{const s=Object.entries(wlByCat).filter(([c])=>c.includes(mc)).reduce((a,[,v])=>a+v,0);if(s>0)mCatsSum[mc]=s;});
  const totalMusicSec2=Object.values(mCatsSum).reduce((s,v)=>s+v,0);
  const musicBreakdownStr=totalMusicSec2>0?Object.entries(mCatsSum).sort((a,b)=>b[1]-a[1]).map(([c,s])=>`  ${c}: ${fmtTime(s)} (${Math.round(s/totalMusicSec2*100)}%)`).join('\n'):'  (記録なし)';

  const lines=[
    `# dræm. 週次レビュー — ${todayStr} (Week ${Math.ceil(dayN/7)})`,
    ``,
    `## 今週の作業`,
    `- 音楽合計: ${fmtTime(thisTotal)} / 目標${G.weeklyHours}h`,
    `- 全活動合計: ${fmtTime(thisTotalAll)} (コンサル・JBG含む)`,
    `- 先週比: ${prevTotal>0?(thisTotal>=prevTotal?'+':'')+Math.round((thisTotal-prevTotal)/Math.max(1,prevTotal)*100)+'%':'初週'}`,
    `- ストリーク: ${sk}日連続`,
    `- 気分: ${moodStr}`,
    `- 平均睡眠: ${avgSleepStr}`,
    ``,
    `## 音楽活動内訳`,
    musicBreakdownStr,
    ``,
    `## カテゴリ別`,
    catBreakdown,
    ``,
    `## KPI`,
    `- 登録者: ${(DB.kpi?.subscribers||0).toLocaleString()} / 目標${G.subTarget.toLocaleString()} (現ペース: ${pred.sub.fmt}後)`,
    `- 再生数(Shorts): ${(DB.kpi?.short_plays||0).toLocaleString()} / 目標${(G.shortPlayTarget||100000).toLocaleString()}`,
    `- 再生数(メイン): ${(DB.kpi?.main_plays||0).toLocaleString()} / 目標${(G.mainPlayTarget||50000).toLocaleString()}`,
    `- 再生数(合計): ${(DB.kpi?.total_plays||0).toLocaleString()}`,
    `- 収益: ¥${(DB.kpi?.revenue||0).toLocaleString()} / 目標¥${G.revenueTarget.toLocaleString()}`,
    `- YouTube投稿(28日): ${DB.kpi?.ytUploads28d??'—'}本`,
    ``,
    `## SNS投稿数（今週）`,
    `- X: ${(()=>{const s=DB.snsLog?.find(s=>s.weekStart===ws);return s?.x??0;})()}投稿`,
    `- ニコニコ動画: ${(()=>{const s=DB.snsLog?.find(s=>s.weekStart===ws);return s?.nn??0;})()}投稿`,
    `- ニコニコフォロワー: ${DB.kpi?.nnFollowers??'未設定'}人`,
    ``,
    `## 作業パターン`,
    pred.bestDow?`- 最も作業多い曜日: ${pred.bestDow}曜日`:'- 曜日データ蓄積中',
    pred.bestHour!==null?`- 最も生産的な時間帯: ${pred.bestHour}時台`:'- 時間帯データ蓄積中',
    ``,
    `## 楽曲進捗`,
    `- リリース済: ${released}曲`,
    cur?`- 制作中: 「${cur.title}」(${STAGES[(DB.songStages&&DB.songStages[cur.title])||DB.songStage||0]})`:'- 制作中: なし',
    ``,
    `## 先週の提案と結果`,
    prevSugSummary,
    ``,
    `## 蓄積データサマリー`,
    `- 累計作業時間: ${Math.floor((DB.timerLog||[]).reduce((s,l)=>s+l.sec,0)/3600)}h`,
    `- 活動日数: ${DB.days?.length||0}日`,
    `- 週次ログ: ${DB.weeklyLog?.length||0}週分`,
    `- SNSログ: ${DB.snsLog?.length||0}週分`,
    ``,
    `---`,
    `上記データをもとに：`,
    `1. 今週の状況の分析`,
    `2. 目標達成のボトルネック特定`,
    `3. 来週の具体的アクション（1〜3個）`,
    `をお願いします。`,
  ];
  return lines.join('\n');
}

});

// ── Apple Health URLパラメータからの自動保存 ──
(()=>{
  const p=new URLSearchParams(location.search);
  let updated=false;
  const sleepV=p.has('sleep')?+p.get('sleep'):null;
  const swimV=p.has('swim')?+p.get('swim'):null;
  if(sleepV!=null&&!isNaN(sleepV)&&sleepV>0&&sleepV<=24){
    const r=(DB.reflections||[]).find(r=>r.date===todayStr);
    const v=+sleepV.toFixed(2);
    if(r)r.sleep=v;else DB.reflections.push({date:todayStr,mood:null,note:'',sleep:v});
    updated=true;
  }
  if(swimV!=null&&!isNaN(swimV)&&swimV>0){
    if(!DB.swimLog)DB.swimLog=[];
    const idx=DB.swimLog.findIndex(s=>s.date===todayStr);
    if(idx>=0)DB.swimLog[idx].dist=swimV;else DB.swimLog.push({date:todayStr,dist:swimV});
    updated=true;
  }
  if(updated){save();history.replaceState({},'',location.pathname);}
})();
