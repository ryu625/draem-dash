name: Fetch Niconico Stats

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Niconico stats
        run: |
          curl -s -H 'X-Frontend-Id: 6' \
            'https://nvapi.nicovideo.jp/v1/users/143339828' \
            -o data/niconico.json

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/niconico.json
          git diff --staged --quiet || git commit -m 'chore: update niconico stats'
          git push
